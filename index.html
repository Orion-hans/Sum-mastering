 <div class="srow"><span class="sk">리미터</span><span class="sv"><span class="no">끔(Bypass)</span> <span class="sub">배경과 합쳐 여기서 마스터</span></span></div>
 <div class="srow"><span class="sk">파일</span><span class="sv">WAV · 24bit · 48kHz · <span class="v">{곡}_forSUMWAVE_premaster.wav</span></span></div></div>
 <button class="tapcard" data-d="handoff"><span class="chev">›</span><span class="tc-h">B용 언마스터 뽑는 법(앱에서)</span><span class="tc-p">리미터 끄고 · -18 맞추고 · 바운스</span><span class="tc-go">로직 설정법 ›</span></button>
 <div class="box soft">규격이 안 맞아도 됨 — 아래 ①에서 음악 트랙 게인으로 맞추면 되지만, 애초에 -18로 뽑아오면 편하다.</div>`},
{phase:'숨웨이브 최종', kicker:'곡마다 ①', title:'곡 얹기 · 배경 켜기 — 5단계',
 html:`<p class="lead">배경 템플릿은 고정 — 곡마다 이 5단계만.</p>
 <div class="spec wide"><div class="srow"><span class="sk">① 음악 교체</span><span class="sv" style="font-size:15.5px">음악 트랙 기존 리전 삭제 → <span class="v">premaster.wav</span> 드래그. 시작점 정렬 · 프레임 3초 뒤에 음악이 오게</span></div>
 <div class="srow"><span class="sk">② 게인 맞춤</span><span class="sv" style="font-size:15.5px">음악 페이더 <span class="v">-6</span> 기준. 배경과 합쳐 Stereo Out 피크가 <span class="v">-3</span> 아래가 되게</span></div>
 <div class="srow"><span class="sk">③ 비트 1종</span><span class="sv" style="font-size:15.5px">목적 바이노럴만 언뮤트(수면=델타 · 명상=세타 · 이완=알파 · 집중=베타)</span></div>
 <div class="srow"><span class="sk">④ 자연음</span><span class="sv" style="font-size:15.5px">2~3종만(비+계곡 / 파도+바람 / 폭포 단독)</span></div>
 <div class="srow"><span class="sk">⑤ 밸런스 체크</span><span class="sv" style="font-size:15.5px">음악 뮤트=배경 편안 / 켜면 앞. 맥놀이 거슬리면 비트 서밍 <span class="v">-2~3dB</span></span></div></div>
 <div class="box soft"><b>다음:</b> 프레임(앞뒤 자연공간) → 마스터 → 바운스.</div>`},
{phase:'숨웨이브 최종', kicker:'곡마다 ② · 앞뒤 자연공간', title:'프레임 세팅',
 html:`<p class="lead">장르 무관. 음악은 그대로 가운데, 손댈 건 <b>앞뒤 3초 자연공간뿐</b> — 트랙 1개 · FX 3개 · 오토메이션.</p>
 <div class="flow">[ 자연공간 3초 ] ─▶ 음악 (그대로) ─▶ [ 자연공간 3초 ]</div>
 <div class="spec"><div class="srow"><span class="sk">EDM</span><span class="sv">열림 · <span class="v">Synth Hall</span> · Predelay <span class="v">40ms</span> · Size <span class="v">90%</span> · Decay <span class="v">3.75s</span> · Distance <span class="v">65%</span></span></div>
 <div class="srow"><span class="sk">앰비언트</span><span class="sv">닫힘 · <span class="v">Dark Room</span> · Predelay <span class="v">20ms</span> · Size <span class="v">55%</span> · Decay <span class="v">2.0s</span> · Distance <span class="v">35%</span></span></div></div>
 <button class="tapcard" data-d="frameroute"><span class="chev">›</span><span class="tc-h">프레임 만드는 법</span><span class="tc-p">FX 3개 + 오토메이션 대상·값</span><span class="tc-go">로직 설정법 ›</span></button>`},
{phase:'숨웨이브 최종', kicker:'곡마다 ③ · 딱 한 번 · 살살', title:'숨웨이브 마스터링 — 순서대로',
 html:MASTER_WELL}
]};

const APPS = {sum:APP_SUM, beat:APP_BEAT, med:APP_MED, band:APP_BAND, play:APP_PLAY, master:APP_MASTER};



/* ===================== 프레임워크 ===================== */
const KEY='oasis_hub_v1';
let mem={};
const store={read(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return mem}},
  write(o){try{localStorage.setItem(KEY,JSON.stringify(o))}catch(e){mem=o}}};
const APP_ORDER=['sum','beat','med','band','play','master'];
let state=Object.assign({app:'sum',idx:{},done:{},presets:{},wake:false,big:false},store.read());
 if(!state.presets)state.presets={};
APP_ORDER.forEach(a=>{if(!(a in state.idx))state.idx[a]=0;if(!(a in state.done))state.done[a]={};});
const save=()=>store.write(state);
const $=id=>document.getElementById(id);
const card=$('card'),main=$('main');

function A(){return APPS[state.app];}
function cur(){return A().steps[state.idx[state.app]];}
function setAccent(){const ap=A();document.documentElement.style.setProperty('--acc',ap.c1);
  document.documentElement.style.setProperty('--acc2',ap.c2);}

function buildAppTabs(){
  $('apptabs').innerHTML=APP_ORDER.map(a=>{
    const ap=APPS[a],on=a===state.app;
    return `<button class="atab ${on?'on':''}" data-a="${a}" style="${on?`background:linear-gradient(120deg,${ap.c1},${ap.c2});`:''}"><span class="dot" style="${on?'background:#08111f55':'background:'+ap.c1}"></span>${ap.name}</button>`;
  }).join('');
  document.querySelectorAll('.atab').forEach(b=>b.onclick=()=>{state.app=b.dataset.a;setAccent();renderAll();});
}
function buildPhases(){
  const ap=A(),ph=[...new Set(ap.steps.map(s=>s.phase))];
  const curPh=cur().phase;
  $('phases').innerHTML=ph.map(p=>`<button class="pchip ${p===curPh?'on':''}" data-p="${p}">${p}</button>`).join('');
  document.querySelectorAll('.pchip').forEach(b=>b.onclick=()=>{
    const i=ap.steps.findIndex(s=>s.phase===b.dataset.p);
    if(i>=0){state.idx[state.app]=i;renderAll();}});
  const on=$('phases').querySelector('.pchip.on');
  if(on)on.scrollIntoView({inline:'center',block:'nearest'});
}
function render(){
  const ap=A(),i=state.idx[state.app],s=ap.steps[i];if(!s)return;
  card.innerHTML=`<div class="kicker">${s.kicker||s.phase}</div><h1 class="title">${s.title}</h1>${s.html}`;
  main.scrollTop=0;
  $('wave').style.width=((i+1)/ap.steps.length*100)+'%';
  $('counter').innerHTML=`<b>${i+1}</b> / ${ap.steps.length}`;
  const d=!!state.done[state.app][i];$('check').classList.toggle('on',d);$('checkTxt').textContent=d?'완료됨':'완료 표시';
  $('prev').disabled=i<=0;const last=i>=ap.steps.length-1;
  const nx=$('next');nx.classList.toggle('fin',last);nx.innerHTML=last?'끝':'다음&nbsp;›';
  document.body.classList.toggle('big',state.big);
  card.querySelectorAll('[data-d]').forEach(el=>el.onclick=()=>openSheet(el.dataset.d));
  if(card.innerHTML.indexOf('{{CHECKLIST}}')>=0)card.innerHTML=card.innerHTML.replace('{{CHECKLIST}}', presetChecklist(state.app));
  bindChecklist();
  buildSubtabs();
  save();
}
function buildSubtabs(){
  const ap=A(),curPh=cur().phase,w=$('subtabs');
  const items=[];ap.steps.forEach((st,i)=>{if(st.phase===curPh)items.push({t:st.title,i});});
  if(items.length<2){w.innerHTML='';w.style.display='none';return;}
  w.style.display='';
  const ci=state.idx[state.app];
  w.innerHTML=items.map(o=>`<button class="pchip ${o.i===ci?'on':''}" data-i="${o.i}">${o.t.length>18?o.t.slice(0,17)+'…':o.t}</button>`).join('');
  w.querySelectorAll('.pchip').forEach(b=>b.onclick=()=>{state.idx[state.app]=+b.dataset.i;renderAll();});
  const on=w.querySelector('.pchip.on');if(on)on.scrollIntoView({inline:'center',block:'nearest'});
}
let SIDX=null;
function buildSearchIndex(){
  const strip=h=>String(h).replace(/<[^>]+>/g,' ').replace(/\s+/g,' ');
  SIDX=[];
  APP_ORDER.forEach(a=>APPS[a].steps.forEach((st,i)=>SIDX.push({kind:'step',app:a,i,t:st.title,ph:st.phase,
    txt:(st.title+' '+st.phase+' '+strip(st.kicker||'')+' '+strip(st.html)).toLowerCase()})));
  Object.keys(DETAILS).forEach(k=>SIDX.push({kind:'sheet',k,t:DETAILS[k].title,
    txt:(DETAILS[k].title+' '+strip(DETAILS[k].html)).toLowerCase()}));
}
function doSearch(q){
  const w=$('srchResults');if(!w)return;q=q.trim().toLowerCase();
  if(q.length<2){w.innerHTML='<div class="hint">두 글자 이상 입력하세요.</div>';return;}
  if(!SIDX)buildSearchIndex();
  const rs=SIDX.filter(o=>o.txt.includes(q)).slice(0,30);
  w.innerHTML=rs.length?rs.map((o,n)=>o.kind==='step'
    ?`<div class="jump" data-n="${n}"><span class="n">${APPS[o.app].name}</span><span class="tx">${o.ph} · ${o.t}</span></div>`
    :`<div class="jump" data-n="${n}"><span class="n">설정법</span><span class="tx">${o.t}</span></div>`).join('')
   :'<div class="hint">결과 없음 — 다른 말로 시도(예: 컴프, 크로스페이드, 808).</div>';
  w.querySelectorAll('.jump').forEach(el=>el.onclick=()=>{const o=rs[+el.dataset.n];
    closeSearch();
    if(o.kind==='sheet'){openSheet(o.k);}
    else{state.app=o.app;state.idx[o.app]=o.i;setAccent();renderAll();}});
}
function openSearch(){const ov=$('srchOv');ov.classList.add('on');const i=$('srchInput');i.value='';doSearch('');setTimeout(()=>i.focus(),50);}
function closeSearch(){$('srchOv').classList.remove('on');}

/* ---- 프리셋 저장 체크리스트 ---- */
function presetList(app){
  const out=[];
  if(app==='beat'){
    BEAT_GENRES.forEach(g=>out.push({group:g.name, items:['킥','스네어/클랩','베이스/808','리드','패드/코드']}));
  } else if(app==='band'){
    BAND_SETS.forEach(x=>{const its=(x.presets||[]).map(pp=>pp[0]); out.push({group:x.name, items:its.length?its:['드럼','베이스','기타','키','보컬']});});
  } else if(app==='play'){
    PLAY_FAMS.forEach(f=>out.push({group:f.id+' · '+f.name, items:(f.tr||[]).map(t=>t[0])}));
  } else if(app==='med'){
    out.push({group:'명상 6종', items:['명상 패드','명상 드론','명상 벨','명상 롱톤','명상 텍스처','명상 자연음']});
  } else if(app==='sum'){
    out.push({group:'숨웨이브 배경', items:['음악','바이노럴','자연음','마스터']});
  }
  return out;
}
function presetChecklist(app){
  const groups=presetList(app);
  if(!groups.length)return '';
  const pd=state.presets[app]||(state.presets[app]={});
  let total=0,done=0;
  const body=groups.map((g,gi)=>{
    const rows=g.items.map((it,ii)=>{const key=gi+'_'+ii;total++;const ck=!!pd[key];if(ck)done++;
      return '<div class="pck '+(ck?'on':'')+'" data-app="'+app+'" data-key="'+key+'"><span class="pbx"><svg viewBox="0 0 24 24" fill="none" stroke="#08111f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span class="ptx">'+it+'</span></div>';}).join('');
    return '<div class="pgrp"><div class="pghd">'+g.group+'</div>'+rows+'</div>';
  }).join('');
  return '<div class="pchecklist"><div class="pcbar"><span>저장 진행 <b class="pcnt">'+done+'/'+total+'</b></span><button class="pcreset" data-app="'+app+'">비우기</button></div>'+body+'</div>';
}
function bindChecklist(){
  card.querySelectorAll('.pck').forEach(el=>el.onclick=()=>{
    const app=el.dataset.app,key=el.dataset.key;
    if(!state.presets[app])state.presets[app]={};
    state.presets[app][key]=!state.presets[app][key];save();render();
  });
  const rb=card.querySelector('.pcreset');
  if(rb)rb.onclick=()=>{if(confirm('이 앱 프리셋 체크를 비울까요?')){state.presets[rb.dataset.app]={};save();render();}};
}

function renderAll(){buildAppTabs();buildPhases();render();}
function go(d){const ap=A();state.idx[state.app]=Math.max(0,Math.min(ap.steps.length-1,state.idx[state.app]+d));buildPhases();render();}

$('next').onclick=()=>go(1);$('prev').onclick=()=>go(-1);
$('check').onclick=()=>{const i=state.idx[state.app];state.done[state.app][i]=!state.done[state.app][i];render();buildSec();};
document.addEventListener('keydown',e=>{
  if($('sheet').classList.contains('on')){if(e.key==='Escape')closeSheet();return;}
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1);}else if(e.key==='ArrowLeft')go(-1);
  else if(e.key==='Enter'){const i=state.idx[state.app];state.done[state.app][i]=!state.done[state.app][i];render();buildSec();}});

let tx=0,ty=0,tt=0;
main.addEventListener('touchstart',e=>{const t=e.changedTouches[0];tx=t.clientX;ty=t.clientY;tt=Date.now();},{passive:true});
main.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.6&&Date.now()-tt<600)go(dx<0?1:-1);},{passive:true});

const sheet=$('sheet'),scrim=$('scrim'),drawer=$('drawer');
function openSheet(id){const d=DETAILS[id];if(!d)return;$('sheetTitle').textContent=d.title;$('sheetBody').innerHTML=d.html;
  sheet.classList.add('on');scrim.classList.add('on');$('sheetBody').scrollTop=0;}
function closeSheet(){sheet.classList.remove('on');if(!drawer.classList.contains('on'))scrim.classList.remove('on');}
$('sheetX').onclick=closeSheet;
let sy=0;
sheet.addEventListener('touchstart',e=>{sy=e.changedTouches[0].clientY;},{passive:true});
sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-sy>70&&$('sheetBody').scrollTop<=0)closeSheet();},{passive:true});

function openDrawer(){buildSec();drawer.classList.add('on');scrim.classList.add('on');sync();}
function closeDrawer(){drawer.classList.remove('on');if(!sheet.classList.contains('on'))scrim.classList.remove('on');}
$('menuBtn').onclick=openDrawer;$('drawerX').onclick=closeDrawer;
$('srchBtn').onclick=openSearch;$('srchClose').onclick=closeSearch;
$('srchInput').oninput=()=>doSearch($('srchInput').value);
$('srchInput').onkeydown=(e)=>{if(e.key==='Escape')closeSearch();};
scrim.onclick=()=>{closeSheet();closeDrawer();};

function buildSec(){const w=$('seclist');let h='',curPh=null;const ap=A();
  ap.steps.forEach((s,i)=>{if(s.phase!==curPh){curPh=s.phase;h+=`<div class="sec-g">${s.phase}</div>`;}
    h+=`<div class="jump ${i===state.idx[state.app]?'cur':''}" data-i="${i}"><span class="n">${String(i+1).padStart(2,'0')}</span><span class="tx">${s.title}</span><span class="st ${state.done[state.app][i]?'done':''}"><svg viewBox="0 0 24 24" fill="none" stroke="#08111f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span></div>`;});
  w.innerHTML=h;w.querySelectorAll('.jump').forEach(el=>el.onclick=()=>{state.idx[state.app]=+el.dataset.i;renderAll();closeDrawer();});}

function sync(){$('swWake').classList.toggle('on',state.wake);$('swBig').classList.toggle('on',state.big);}
$('swBig').onclick=()=>{state.big=!state.big;sync();render();};
$('swWake').onclick=()=>{state.wake=!state.wake;sync();save();state.wake?reqWake():relWake();};
let wl=null;
async function reqWake(){try{wl=await navigator.wakeLock.request('screen');}catch(e){}}
function relWake(){try{wl&&wl.release();wl=null;}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(state.wake&&document.visibilityState==='visible')reqWake();});
$('reset').onclick=()=>{if(confirm(A().name+' 진행·체크를 지울까요?')){state.idx[state.app]=0;state.done[state.app]={};renderAll();buildSec();}};

(function(){const w=$('dlist');if(!w)return;
  w.innerHTML=Object.keys(DETAILS).map(k=>`<div class="jump" data-d="${k}"><span class="n">›</span><span class="tx">${DETAILS[k].title}</span></div>`).join('');
  w.querySelectorAll('.jump').forEach(el=>el.onclick=()=>{closeDrawer();openSheet(el.dataset.d);});})();
setAccent();renderAll();if(state.wake)reqWake();
</script>
</body>
</html>
