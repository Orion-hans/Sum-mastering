<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B1220">
<title>SOUND OASIS 세션 러너</title>
<style>
:root{
  --ink:#0B1220; --panel:#141E30; --panel2:#0F1A2C; --line:#26344C;
  --acc:#63D6CC; --acc2:#8394FF; --lcd:#FFDD92; --lcd-bg:#20160B;
  --txt:#EEF2F9; --mut:#9AA7BF; --dim:#657391;
  --warn:#FFA86B; --warn-bg:#2C1810; --ok:#63D6CC; --no:#FF7683;
  --tap:60px; --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--ink);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
  font-size:18px;line-height:1.55;letter-spacing:-.01em;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;}
body.big{font-size:20px;}
.v{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-weight:600;color:var(--lcd);
  background:var(--lcd-bg);border:1px solid #40301680;padding:.08em .45em;border-radius:7px;
  font-size:.95em;white-space:nowrap;letter-spacing:0;box-shadow:inset 0 1px 0 #ffffff12;}
.k{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-weight:600;color:var(--txt);
  background:#1D2A44;border:1px solid var(--line);border-bottom-width:2px;padding:.08em .5em;
  border-radius:7px;font-size:.92em;white-space:nowrap;letter-spacing:0;}
.no{color:var(--no);font-weight:700;} .hot{color:var(--warn);font-weight:700;}
b,strong{font-weight:700;color:#fff;}
.mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;}

#app{min-height:100%;display:flex;flex-direction:column;}
header{position:sticky;top:0;z-index:20;background:linear-gradient(#0B1220,#0B1220f2);
  padding-top:calc(var(--st) + 8px);backdrop-filter:blur(8px);border-bottom:1px solid #16223a;}
.wave-wrap{height:5px;background:#1B2740;overflow:hidden;margin:0 15px;border-radius:5px;}
.wave-fill{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2));
  transition:width .35s cubic-bezier(.4,0,.2,1);border-radius:5px;}
/* app tabs */
.approw{display:flex;align-items:center;gap:6px;padding:10px 15px 4px;}
.apptabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1;min-width:0;}
.srch-btn{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:var(--panel);
  border:1px solid var(--line);color:var(--acc);display:flex;align-items:center;justify-content:center;}
.srch-btn svg{width:19px;height:19px;} .srch-btn:active{filter:brightness(1.25);}
.srch-ov{position:fixed;inset:0;z-index:40;background:#04070df2;display:none;flex-direction:column;
  padding:calc(16px + var(--st)) 16px 16px;}
.srch-ov.on{display:flex;}
.srch-top{display:flex;gap:10px;align-items:center;margin-bottom:14px;max-width:820px;width:100%;margin-left:auto;margin-right:auto;}
.srch-top input{flex:1;padding:15px 17px;border-radius:14px;border:1px solid var(--acc);
  background:var(--panel2);color:var(--txt);font-size:17px;}
.srch-top input:focus{outline:none;}
.srch-top .x{flex:0 0 auto;width:46px;height:46px;border-radius:13px;background:#101B2D;
  border:1px solid var(--line);color:var(--txt);font-size:20px;}
#srchResults{overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:820px;width:100%;margin:0 auto;flex:1;}
#srchResults .jump{display:flex;gap:11px;align-items:center;padding:14px 6px;border-bottom:1px solid #1c2840;cursor:pointer;}
#srchResults .jump:active{background:#0e1a2c;}
#srchResults .n{flex:0 0 auto;min-width:78px;font-size:11.5px;font-weight:800;color:var(--acc);
  text-align:center;border:1px solid #245064;background:#0d1e2e;padding:5px 6px;border-radius:8px;}
#srchResults .tx{font-size:15.5px;color:var(--txt);}
#srchResults .hint{color:var(--mut);font-size:15px;padding:14px 4px;}
.apptabs::-webkit-scrollbar{display:none;}
.atab{flex:0 0 auto;padding:9px 15px;border-radius:13px;background:var(--panel2);
  border:1px solid var(--line);color:var(--mut);font-size:14.5px;font-weight:800;white-space:nowrap;
  display:flex;align-items:center;gap:7px;}
.atab .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);}
.atab.on{color:#08111f;border-color:transparent;}
/* phase chips */
.phases{display:flex;gap:6px;overflow-x:auto;padding:8px 15px 10px;scrollbar-width:none;align-items:center;}
.phases::-webkit-scrollbar{display:none;}
.pchip{flex:0 0 auto;padding:7px 13px;border-radius:20px;background:transparent;
  border:1px solid var(--line);color:var(--mut);font-size:13.5px;font-weight:700;white-space:nowrap;}
.pchip.on{color:#fff;border-color:var(--acc);background:#0f2330;}
.phases.sub{padding-top:0;padding-bottom:8px;}
.phases.sub .pchip{font-size:12.5px;padding:6px 11px;border-style:dashed;color:var(--dim);}
.phases.sub .pchip.on{border-style:solid;color:#fff;}
.pchecklist{margin:12px 0;}
.pcbar{display:flex;align-items:center;justify-content:space-between;font-size:14px;color:var(--mut);margin-bottom:10px;}
.pcbar .pcnt{color:var(--acc);font-size:16px;}
.pcreset{background:#101B2D;border:1px solid var(--line);color:var(--mut);font-size:12px;padding:6px 12px;border-radius:9px;}
.pgrp{margin-bottom:14px;}
.pghd{font-size:13px;font-weight:800;color:#cfe;margin:8px 0 6px;padding-left:2px;}
.pck{display:flex;align-items:center;gap:11px;padding:11px 12px;margin-bottom:6px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);cursor:pointer;}
.pck:active{filter:brightness(1.15);}
.pck .pbx{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;}
.pck .pbx svg{width:14px;height:14px;opacity:0;}
.pck .ptx{font-size:15.5px;color:var(--txt);}
.pck.on{border-color:var(--ok);background:linear-gradient(90deg,#123a33,#14263f);}
.pck.on .pbx{background:var(--ok);border-color:var(--ok);}
.pck.on .pbx svg{opacity:1;}
.pck.on .ptx{color:#fff;}
.searchbox{width:100%;padding:13px 15px;border-radius:13px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:16px;margin:6px 0 12px;}
.searchbox:focus{outline:none;border-color:var(--acc);}
#searchRes .jump{border-bottom:1px solid #1c2840;border-radius:0;}
#searchRes .n{width:auto;min-width:40px;font-size:11px;}
.counterline{display:flex;align-items:center;gap:8px;padding:0 15px 8px;}
.counter{font-family:ui-monospace,monospace;font-size:13.5px;color:var(--mut);}
.counter b{color:var(--txt);font-size:15px;}
.menu-btn{margin-left:auto;width:38px;height:38px;border-radius:11px;background:var(--panel);
  border:1px solid var(--line);color:var(--txt);display:flex;align-items:center;justify-content:center;}
.menu-btn svg{width:19px;height:19px;}

main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 16px calc(var(--tap) + 38px + var(--sb));}
.card{width:100%;max-width:680px;margin:0 auto;animation:pop .28s cubic-bezier(.2,.7,.3,1);}
@keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.kicker{font-size:14px;color:var(--mut);font-weight:700;margin:4px 0 4px;}
h1.title{font-size:28px;line-height:1.18;font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:13px;}
.lead{font-size:18px;color:var(--txt);margin:12px 0;}
.lead.sm{font-size:16.5px;color:var(--mut);}

.spec{border:1px solid var(--line);border-radius:16px;overflow:hidden;margin:13px 0;}
.srow{display:flex;gap:12px;padding:13px 15px;align-items:baseline;border-top:1px solid var(--line);}
.srow:first-child{border-top:none;}
.srow:nth-child(even){background:#0F1A2C7a;}
.srow .sk{flex:0 0 33%;font-size:14px;color:var(--mut);font-weight:700;}
.srow .sv{flex:1;font-size:17.5px;color:#fff;font-weight:600;}
.srow .sv .sub{display:block;font-size:13.5px;color:var(--mut);font-weight:400;margin-top:3px;}
.spec.wide .sk{flex:0 0 42%;}

.plist{display:flex;flex-direction:column;gap:9px;margin:13px 0;}
.pitem{border:1px solid var(--line);border-radius:14px;padding:12px 15px;background:var(--panel2);border-left:3px solid var(--acc);}
.pitem:nth-child(even){border-left-color:var(--acc2);}
.pitem .ph{font-weight:800;color:#fff;font-size:17px;margin-bottom:2px;}
.pitem .pd{font-size:15px;color:var(--mut);}

.tapcard{display:block;width:100%;text-align:left;border:1px solid #2f4360;border-left:4px solid var(--acc);
  border-radius:16px;padding:14px 16px;margin:13px 0;background:linear-gradient(180deg,#132338,#0F1B2D);
  color:var(--txt);position:relative;}
.tapcard:active{background:#16273e;}
.tapcard .tc-h{font-weight:800;font-size:17.5px;color:#fff;padding-right:26px;}
.tapcard .tc-p{font-size:15px;color:var(--mut);margin-top:4px;padding-right:26px;}
.tapcard .tc-go{display:inline-flex;gap:5px;margin-top:9px;font-size:13.5px;font-weight:800;color:var(--acc);}
.tapcard .chev{position:absolute;right:15px;top:15px;color:var(--acc);font-size:22px;line-height:1;}

.box{border:1px solid var(--line);background:var(--panel);border-radius:15px;padding:13px 15px;margin:13px 0;font-size:16px;}
.box.soft{background:#101B2D;}
.box.warn{background:var(--warn-bg);border-color:#5c3616;} .box.warn .bt{color:var(--warn);}
.box.hot{background:#2c1014;border-color:#5c2028;} .box.hot .bt{color:var(--no);}
.box.tip{background:#0d1e2e;border-color:#245064;} .box.tip .bt{color:var(--acc);}
.bt{font-weight:800;font-size:15px;margin-bottom:6px;}
.box p{margin:7px 0;} .box p:first-child{margin-top:0;} .box p:last-child{margin-bottom:0;}
.box ul{margin:4px 0 4px 18px;} .box li{margin:5px 0;font-size:15.5px;}

.tree,.flow{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13.5px;line-height:1.72;
  background:#080F1C;border:1px solid var(--line);border-radius:15px;padding:14px;margin:13px 0;
  white-space:pre-wrap;letter-spacing:0;color:#c8d6f0;}
.tree .h,.flow .h{color:#fff;font-weight:700;}
.flow .mus{color:var(--lcd);} .flow .bl{color:var(--acc);} .flow .br{color:var(--acc2);}

.ab{display:flex;flex-direction:column;gap:11px;margin:13px 0;}
.abcard{border:1px solid var(--line);border-radius:16px;padding:15px;background:var(--panel2);}
.abcard .abh{display:flex;align-items:center;gap:10px;font-weight:800;font-size:19px;margin-bottom:5px;}
.abcard .badge{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#08111f;flex:0 0 auto;}
.abcard.a{border-left:4px solid var(--acc);} .abcard.a .badge{background:var(--acc);} .abcard.a .abh span{color:var(--acc);}
.abcard.b{border-left:4px solid var(--acc2);} .abcard.b .badge{background:var(--acc2);} .abcard.b .abh span{color:var(--acc2);}
.abcard .abd{font-size:15.5px;color:var(--mut);}

footer{position:fixed;left:0;right:0;bottom:0;z-index:20;
  padding:9px 13px calc(9px + var(--sb));background:linear-gradient(#0b122000,#0B1220 24%);display:flex;gap:10px;}
.nav{flex:0 0 auto;width:var(--tap);height:var(--tap);border-radius:17px;background:var(--panel);
  border:1px solid var(--line);color:var(--txt);display:flex;align-items:center;justify-content:center;font-size:26px;}
.nav:active{background:#1D2A44;} .nav:disabled{opacity:.3;}
.check{flex:1;height:var(--tap);border-radius:17px;border:1px solid var(--line);background:var(--panel);
  color:var(--txt);font-size:16.5px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:9px;}
.check .ck{width:24px;height:24px;border-radius:8px;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;}
.check.on{border-color:var(--ok);color:#fff;background:linear-gradient(90deg,#123a33,#1b2d49);}
.check.on .ck{background:var(--ok);border-color:var(--ok);}
.check .ck svg{width:14px;height:14px;opacity:0;} .check.on .ck svg{opacity:1;}
.next{flex:0 0 auto;width:calc(var(--tap) + 28px);height:var(--tap);border-radius:17px;
  background:linear-gradient(120deg,var(--acc),var(--acc2));color:#08111f;font-weight:800;font-size:17.5px;
  display:flex;align-items:center;justify-content:center;border:none;}
.next:active{filter:brightness(1.08);} .next.fin{background:linear-gradient(120deg,#2b3652,#38446a);color:var(--txt);}

.scrim{position:fixed;inset:0;background:#04070dbb;z-index:30;opacity:0;pointer-events:none;transition:opacity .25s;}
.scrim.on{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:32;background:var(--panel);
  border-top:1px solid var(--line);border-radius:22px 22px 0 0;transform:translateY(101%);
  transition:transform .3s cubic-bezier(.3,.7,.3,1);max-height:88vh;display:flex;flex-direction:column;
  box-shadow:0 -20px 60px #0008;}
.sheet.on{transform:none;}
.sheet .grip{width:44px;height:5px;border-radius:3px;background:#33425e;margin:10px auto 4px;flex:0 0 auto;}
.sheet .shead{display:flex;align-items:center;gap:10px;padding:6px 18px 12px;border-bottom:1px solid var(--line);}
.sheet .shead .st{font-weight:800;font-size:18px;color:#fff;flex:1;}
.sheet .shead .tag{font-size:12px;font-weight:800;color:var(--acc);border:1px solid #245064;background:#0d1e2e;padding:3px 9px;border-radius:20px;flex:0 0 auto;}
.sheet .shead .x{width:38px;height:38px;border-radius:11px;background:#101B2D;border:1px solid var(--line);color:var(--txt);font-size:19px;flex:0 0 auto;}
.sheet .sbody{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:15px 18px calc(24px + var(--sb));}
.lstep{display:flex;gap:12px;margin:13px 0;}
.lstep .ln{flex:0 0 auto;width:30px;height:30px;border-radius:10px;background:#132338;border:1px solid #2f4360;
  color:var(--acc);font-family:ui-monospace,monospace;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;}
.lstep .lc{flex:1;font-size:16.5px;padding-top:2px;}
.lstep .lc .path{display:block;margin-top:5px;font-family:ui-monospace,monospace;font-size:13.5px;color:#bcd0f0;background:#0b1524;border:1px solid var(--line);border-radius:9px;padding:8px 10px;white-space:pre-wrap;}
.sbody .box{font-size:15.5px;}

.drawer{position:fixed;top:0;right:0;height:100%;width:min(88%,390px);z-index:31;background:var(--panel);
  border-left:1px solid var(--line);transform:translateX(102%);transition:transform .28s cubic-bezier(.3,.7,.3,1);
  display:flex;flex-direction:column;padding-top:var(--st);}
.drawer.on{transform:none;}
.dhead{padding:16px 18px 11px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);}
.dhead .t{font-weight:800;font-size:18px;}
.dhead .x{margin-left:auto;width:36px;height:36px;border-radius:11px;background:#101B2D;border:1px solid var(--line);color:var(--txt);font-size:18px;}
.dbody{flex:1;overflow-y:auto;padding:6px 12px calc(20px + var(--sb));}
.opt{display:flex;align-items:center;gap:11px;padding:13px 8px;border-bottom:1px solid #1c2840;}
.opt .lbl{font-size:16px;} .opt .sub{font-size:13px;color:var(--mut);}
.opt .sw{margin-left:auto;width:52px;height:31px;border-radius:16px;background:#1c2840;border:1px solid var(--line);position:relative;flex:0 0 auto;}
.opt .sw::after{content:"";position:absolute;top:2px;left:2px;width:25px;height:25px;border-radius:50%;background:#657391;transition:.2s;}
.opt .sw.on{background:#153731;border-color:var(--ok);} .opt .sw.on::after{left:23px;background:var(--ok);}
.sec-g{margin:14px 0 4px;font-size:12px;letter-spacing:.06em;color:var(--dim);font-weight:800;padding:0 8px;}
.jump{display:flex;align-items:center;gap:11px;padding:11px 8px;border-radius:12px;font-size:15px;}
.jump:active,.jump.cur{background:#101B2D;}
.jump .n{font-family:ui-monospace,monospace;font-size:12px;color:var(--mut);width:30px;flex:0 0 auto;}
.jump .tx{flex:1;color:var(--txt);} .jump.cur .tx{color:#fff;font-weight:800;}
.jump .st{width:18px;height:18px;border-radius:6px;border:1.5px solid var(--dim);flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
.jump .st.done{background:var(--ok);border-color:var(--ok);} .jump .st svg{width:11px;height:11px;opacity:0;} .jump .st.done svg{opacity:1;}
.reset{margin:18px 8px 4px;width:calc(100% - 16px);padding:13px;border-radius:13px;background:#2c1014;border:1px solid #5c2028;color:var(--no);font-weight:800;font-size:14px;}
.tp{cursor:pointer;position:relative;}
.srow.tp,.box.tp{padding-right:36px;}
.tp::after{content:"›";position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--acc);font-size:20px;font-weight:800;line-height:1;}
.tp:active{filter:brightness(1.18);}

/* ===== 반응형: 태블릿 ===== */
@media (min-width:700px){
  body{font-size:19px;}
  body.big{font-size:21px;}
  main{padding:22px 24px calc(var(--tap) + 44px + var(--sb));}
  .card{max-width:760px;}
  h1.title{font-size:32px;}
  .apptabs,.phases,.counterline{padding-left:24px;padding-right:24px;}
  footer{padding-left:24px;padding-right:24px;}
  .sheet,.sheet .sbody{max-width:820px;margin-left:auto;margin-right:auto;}
  .sheet{border-radius:22px 22px 0 0;}
}
/* ===== 반응형: 노트북·데스크톱 ===== */
@media (min-width:1080px){
  main{padding:28px 32px calc(var(--tap) + 50px + var(--sb));}
  .card{max-width:900px;}
  h1.title{font-size:34px;}
  .spec.wide .sk{flex:0 0 34%;}
  .srow .sk{flex:0 0 28%;}
  .drawer{width:420px;}
  .sheet .sbody{padding-left:32px;padding-right:32px;}
}
/* ===== 큰 화면에서 두 칼럼 카드 폭 안정 ===== */
@media (min-width:1400px){
  .card{max-width:980px;}
}
/* 가로 모드(폰 눕힘) 시 헤더 컴팩트 */
@media (max-height:480px) and (orientation:landscape){
  h1.title{font-size:24px;margin-bottom:9px;}
  main{padding-top:10px;}
  .apptabs{padding-top:6px;}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="wave-wrap"><div class="wave-fill" id="wave"></div></div>
    <div class="approw">
      <div class="apptabs" id="apptabs"></div>
      <button class="srch-btn" id="srchBtn" aria-label="검색"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></button>
    </div>
    <div class="phases" id="phases"></div>
    <div class="phases sub" id="subtabs" style="display:none"></div>
    <div class="counterline">
      <span class="counter" id="counter"></span>
      <button class="menu-btn" id="menuBtn" aria-label="목차"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
    </div>
  </header>
  <main id="main"><div class="card" id="card"></div></main>
  <footer>
    <button class="nav" id="prev">‹</button>
    <button class="check" id="check"><span class="ck"><svg viewBox="0 0 24 24" fill="none" stroke="#08111f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span id="checkTxt">완료 표시</span></button>
    <button class="next" id="next">다음&nbsp;›</button>
  </footer>
</div>

<div class="srch-ov" id="srchOv">
  <div class="srch-top">
    <input id="srchInput" placeholder="예: 사이드체인 · 크로스페이드 · 808 · CC1 · 마키 …" autocomplete="off">
    <button class="x" id="srchClose">✕</button>
  </div>
  <div id="srchResults"></div>
</div>

<div class="lstep"><span class="ln">5</span><span class="lc"><b>Compressor — "접착제".</b> <span class="v">2:1</span> · Attack <span class="v">30ms</span> · Release <span class="v">Auto</span> → Threshold를 살짝 내려 <b>GR 미터가 1–2dB</b>만. 곡 전체가 한 덩어리로 붙는다. 더 누르면 답답·납작.</span></div>

<div class="lstep"><span class="ln">8</span><span class="lc"><b>검사.</b> 곡 처음~끝 재생 → I가 목표 ±0.5 안, True Peak가 -1 안 넘으면 합격. 리미터 GR이 <span class="no">3dB 넘게 계속</span> 튀면 과함 → Gain 내리거나 믹스로 복귀. <b>위상도:</b> MultiMeter의 Correlation이 0~+1 사이에서 움직이면 안전 — 지속적으로 0 아래면 와이드너·스테레오 딜레이를 의심하고 믹스로.<span class="path">Stereo Out → Audio FX → Metering → MultiMeter → Correlation</span></span></div>

<div class="lstep"><span class="ln">6</span><span class="lc"><b>Adaptive Limiter</b> — 창 조작: 가운데 큰 노브 = <b>Gain</b>(올리는 양, 재생하며 천천히) · <b>Out Ceiling</b> 필드 더블클릭 <span class="v">-1.0</span> · <b>True Peak Detection</b> 버튼 ON. Gain은 리미터 미터가 <b>GR 1–2dB 이하</b>로만 — 절대 세게 밀지 않는다.<span class="path">Stereo Out → Audio FX → Dynamics → Adaptive Limiter</span></span></div>
<div class="lstep"><span class="ln">7</span><span class="lc"><b>목표 음량(목적별):</b> 집중·일반 <span class="v">-16</span> / 이완·명상 <span class="v">-18</span> / 수면 <span class="v">-20 LUFS</span>. 재생하며 Integrated 확인. <b>다른 곡보다 조용해도 정상 — 의도다.</b></span></div>
<div class="lstep"><span class="ln">8</span><span class="lc"><b>모노 점검.</b> Stereo Out에 잠깐 Gain의 모노 스위치(또는 Direction Mixer)로 모노 합산해 들어봄 — 바이노럴이 위상으로 사라지진 않는지. 확인 후 <b>반드시 스테레오로 되돌림</b>.</span></div>
<div class="lstep"><span class="ln">9</span><span class="lc"><b>바운스.</b> <span class="k">Cmd+B</span> → WAV · 24bit · 48kHz · Normalize <b>Off</b> · 파일명 <span class="v">{곡}_숨웨이브_final.wav</span>.</span></div>
<div class="box soft"><b>꽂는 위치 택1:</b> ① 간단 — Stereo Out에 직접(대부분 충분) ② 정밀 — 모든 버스 Output을 <span class="v">Bus 6</span>(서브믹스 Aux)로 모아 거기에. 레퍼런스 곡과 A/B 비교할 계획이면 ②.</div>
<div class="box hot"><b class="no">⚠ 금지 3가지</b> ① 과한 리미팅(다이내믹 사망) ② 스테레오 와이드너·이미저(바이노럴 좌우 위상 파괴 = 효과 소멸) ③ 멀티밴드로 비트 대역 누르기. Stereo Out 페이더는 <span class="v">0dB</span> 고정 — 음량은 리미터 Gain으로만.</div>`;

const DETAILS = {
handoff:{title:'B로 보낼 언마스터 2믹스', html:`
<p class="lead sm">배경과 합쳐 숨웨이브에서 마스터하므로, 넘길 파일은 <b>마스터를 안 한</b> 여유 있는 믹스다. <b>2믹스</b>=전 트랙을 스테레오 한 파일로 합친 것.</p>
<div class="lstep"><span class="ln">1</span><span class="lc"><b>마스터 리미터 끄기.</b> Stereo Out의 리미터를 <b>Bypass</b>. 남겨둘 거면 GR이 <span class="v">1dB</span>를 넘지 않게.<span class="path">믹서 → Stereo Out → 리미터 좌상단 파란 불 클릭(Bypass)</span></span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>LUFS 확인.</b> Loudness Meter를 걸고 곡 전체 재생 → <b>Integrated(I)</b> 값.<span class="path">Stereo Out → Audio FX → Metering → Loudness Meter</span></span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>-18로 맞추기.</b> I가 -18보다 크면(예 <span class="v">-12</span>) 차이만큼 Gain으로 낮춤(<span class="v">-6dB</span>). 재생해 I ≈ <span class="v">-18</span> 확인.<span class="path">Stereo Out → Audio FX → Utility → Gain</span></span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>피크 헤드룸.</b> True Peak가 <span class="v">-3 ~ -6 dBFS</span>에 오게. 0 근처면 Gain 더 내림.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc"><b>바운스.</b> <span class="k">Cmd+B</span> → WAV · <b>24bit</b> · <b>48kHz</b> · Normalize <b>Off</b>. 파일명 <span class="v">{곡}_forSUMWAVE_premaster.wav</span>. 독립분은 <span class="v">{곡}_master_-14LUFS.wav</span>로 구분.</span></div>`},

makebus:{title:'버스로 묶기 (그룹·서브믹스)', html:`
<p class="lead sm">여러 트랙을 하나로 = 각 트랙 <b>Output</b>을 같은 버스로. Aux 자동 생성.</p>
<div class="lstep"><span class="ln">1</span><span class="lc"><b>빠른 법.</b> 트랙 다중 선택 → <span class="k">Shift+Cmd+D</span> → <b>Summing Stack</b>(서밍=라우팅+정리 / Folder=시각만).<span class="path">트랙 선택 → Shift+Cmd+D → Summing Stack</span></span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>수동 법.</b> 채널 맨 아래 <b>Output 슬롯</b> 클릭 → Bus → 빈 번호.<span class="path">채널 하단 Output → Bus → Bus 2 …</span></span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>이름.</b> Aux 더블클릭 → 용도명. 소리는 번호가 아니라 이름·연결로 흐른다.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>Aux를 트랙 영역에.</b> Aux 우클릭 → Create Track (<span class="k">Ctrl+T</span>).</span></div>
<div class="box tip"><b>서브믹스:</b> 모든 버스 Output을 <span class="v">Bus 6</span>(SUBMIX)로 모아 마스터 FX. 레퍼런스 비교 계획이면 필수.</div>
<div class="box hot"><b class="no">⚠ 이중 감쇠:</b> 트랙·버스 둘 다 줄이면 곱해짐(트랙 -20 + 버스 -20 = -40). 개별은 0dB, 조절은 버스에서만.</div>`},

reverbsend:{title:'리버브·딜레이 Send 걸기', html:`
<p class="lead sm">공간은 Output이 아니라 <b>Send</b>(일부만 복사) — 컴프가 꼬리를 안 누르고 여러 트랙이 한 공간을 공유.</p>
<div class="lstep"><span class="ln">1</span><span class="lc">트랙(들) 선택 → 채널 <b>Send 슬롯</b> → 빈 Bus. 리버브 Aux 자동 생성.<span class="path">채널 Send 슬롯 → Bus N</span></span></div>
<div class="lstep"><span class="ln">2</span><span class="lc">Aux 인서트에 <b>ChromaVerb</b>(또는 딜레이). <span class="v">Mix Wet 100 / Dry 0</span> — 양은 각 트랙 Send 노브가.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc">Send 노브 더블클릭 → dB 타이핑. Send 모드 <b>Post Fader</b> 권장(슬롯 우클릭).</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc">리턴(Aux)에 Channel EQ: HPF <span class="v">200~300</span> · LPF <span class="v">8k</span> — 진흙·쉬쉬 제거.</span></div>`},

oscillator:{title:'Test Oscillator (바이노럴)', html:`
<div class="lstep"><span class="ln">1</span><span class="lc">Beat L·R 각 트랙 → <b>Audio FX → Utility → Test Oscillator</b>.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc">파형 <b>Sine</b>. 사각/톱니 <span class="no">아님</span>(순음이라야 맑고 안 피로).</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>Frequency 더블클릭 → 숫자 직접 입력</b>(1Hz~22kHz). L=캐리어, R=캐리어+맥놀이.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>하드팬:</b> 팬 노브 더블클릭 → L <span class="v">-64</span> / R <span class="v">+64</span>. Balance 아님 → <b>Pan</b>(스테레오면 노브 우클릭 → Stereo Pan). Level 좌우 동일.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc">완성 후 <b>Bounce</b>로 스테레오 렌더 → 재사용.</span></div>
<div class="box hot"><b class="no">⚠ 절대 금지</b> EQ·리버브·컴프·이미저·미드사이드 — 좌우 위상차 깨져 효과 소멸. Pan·Level만.</div>`},

eq:{title:'Channel EQ 걸기', html:`
<div class="lstep"><span class="ln">1</span><span class="lc">트랙 → <b>Audio FX → EQ → Channel EQ</b>.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>HPF:</b> 맨 왼쪽 밴드1 클릭 켬 → Freq 필드 타이핑.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>벨:</b> 가운데 밴드 켜고 노드 드래그(좌우 Freq·상하 Gain) 또는 하단 필드 타이핑. <b>Q</b>는 <span class="k">Opt</span> 드래그.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>셸프/하이컷:</b> 맨 오른쪽 밴드. 값 입력은 더블클릭 → 숫자 → <span class="k">Enter</span>(<span class="k">⇧</span>드래그=미세, <span class="k">⌥</span>클릭=기본값).</span></div>
<div class="box soft">HPF=아래 컷 · 셸프=위 전체 · 벨=한 지점 산/골 · Q=폭(클수록 좁음) · 감산 EQ는 컴프 앞, 부스트는 뒤.</div>`},

comp:{title:'Compressor 세팅', html:`
<div class="lstep"><span class="ln">1</span><span class="lc">트랙 → <b>Audio FX → Dynamics → Compressor</b>. 상단 <b>모델 드롭다운</b>: Studio VCA(범용) / Studio FET(펀치) / Vintage Opto(부드러움).</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>Ratio·Threshold:</b> Ratio 타이핑(2:1 약 / 4:1 표준) → Threshold를 내려 <b>GR 미터</b>가 목표 dB만큼 움직이게.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>Attack/Release:</b> 필드 타이핑(ms). 어택 짧게=어택을 잡음, 길게=어택 통과. 릴리즈는 박자 호흡에.</span></div>
<div class="box soft">GR(Gain Reduction)=실제 누른 양. 글루=버스에 1~2dB만.</div>`},

sidechain:{title:'사이드체인 (킥 → 베이스/패드)', html:`
<p class="lead sm">킥이 칠 때 다른 트랙을 순간 눌러 킥 자리를 비우는 펌핑.</p>
<div class="lstep"><span class="ln">1</span><span class="lc">눌릴 트랙(베이스·패드)에 <b>Compressor</b> 삽입.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc">플러그인 우상단 <b>Side Chain 드롭다운</b> → 킥 트랙(또는 킥 버스) 선택.<span class="path">Compressor 헤더 우측 Side Chain ▾ → Kick</span></span></div>
<div class="lstep"><span class="ln">3</span><span class="lc">값: Studio VCA · Ratio <span class="v">4:1</span> · Atk <span class="v">1ms</span> · Rel <span class="v">~100ms</span>(또는 1/4음표 호흡) → Threshold 내려 GR 목표(EDM 강 <span class="v">4–6dB</span> / 팝 약 <span class="v">2–3dB</span>).</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc">재생하며 킥마다 GR이 튀는지 확인 — 과하면 킥 꼬리가 들림 → Rel 줄임.</span></div>`},

parallel:{title:'병렬 컴프 (드럼 두께)', html:`
<div class="lstep"><span class="ln">1</span><span class="lc">드럼 트랙(들) <b>Send → Bus 3</b> → Aux 자동 생성(이름 PARALLEL).</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc">그 Aux에 <b>Compressor(Studio FET)</b>: <span class="v">8:1</span>(10:1도 좋음) · 어택 <b>빠르게</b>(1–10ms) · Rel <span class="v">100ms</span> · Threshold를 내려 <b>GR 10–15dB</b> — 혼자 들으면 뭉개진 게 정상. 펀치는 원본이 담당하니 여긴 과감하게.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc">컴프 <b>앞에 Channel EQ HPF <span class="v">80–100Hz</span></b> — 킥의 서브가 원본과 겹쳐 뭉개지는 걸 방지(요즘 표준 세팅).</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc">Aux 페이더를 <b>0에서부터</b> 천천히 올려 원본 밑에 깔음 — 커진 게 느껴지되 컴프가 "들리기" 직전에 멈춤. 뮤트해봐서 드럼이 갑자기 힘 빠지면 성공.</span></div>`},

importmidi:{title:'앱 MIDI → 로직 열기', html:`
<div class="lstep"><span class="ln">1</span><span class="lc"><b>열기 — 두 가지 다 됨:</b> ① <b>빈 트랙영역(회색 빈 공간)에 .mid 드래그</b> ② File → Open. 둘 다 멀티트랙이 이름표와 함께 전개된다. <span class="no">기존 트랙 위에 드래그는 금지</span> — 전 트랙이 한 줄에 뭉친다.<span class="path">Finder에서 {곡}.mid → 로직 트랙영역 빈 공간에 드래그</span></span></div>
<div class="lstep"><span class="ln">2</span><span class="lc">템포·마커·조표 자동. "Import tempo" 물으면 <b>체크</b>(리타르단도까지 들어옴).</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>템플릿 버스·마스터 가져오기:</b> File → Import → Logic Projects → 템플릿 선택 → <b>Sends 체크</b> → Add(리버브 Aux와 목적지 채널까지 통째로).<span class="path">File → Import → Logic Projects → Sends ✓ → Add</span></span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>음원 로딩:</b> 트랙 선택 → 라이브러리 <span class="k">Y</span> → 저장한 프리셋/패치 클릭(GM 프로그램체인지는 무시 — 실악기로 안 바뀜).</span></div>`},

reuse:{title:'한 번 저장하면 계속 쓰는 것 — 전체 지도', html:`
<p class="lead sm">로직에서 <b>최초 1회</b> 만들어두면 이후 모든 곡에서 재사용되는 것들. 곡마다 다시 만들지 마라.</p>
<div class="kicker">① 프로젝트 통째 — 템플릿</div>
<div class="spec wide"><div class="srow"><span class="sk">무엇</span><span class="sv" style="font-size:15px">버스(리버브A/B·병렬·홀)·마스터 체인·기본값(48k·PDC·Pan Law)·트랙 배치</span></div>
<div class="srow"><span class="sk">저장</span><span class="sv" style="font-size:15px">File → Save as Template → 이름</span></div>
<div class="srow"><span class="sk">불러오기</span><span class="sv" style="font-size:15px">새 곡: 이 템플릿으로 시작 · 기존 곡에 버스만: File → Import → Logic Projects → Sends 체크</span></div></div>
<div class="kicker">② 트랙 한 줄 — 채널 스트립 (.cst)</div>
<div class="spec wide"><div class="srow"><span class="sk">무엇</span><span class="sv" style="font-size:15px">악기+인서트+파라미터+센드 양 (볼륨·팬 제외)</span></div>
<div class="srow"><span class="sk">저장</span><span class="sv" style="font-size:15px">믹서 채널 Setting 막대 → Save Channel Strip Setting</span></div>
<div class="srow"><span class="sk">쓰임</span><span class="sv" style="font-size:15px">장르 프리셋 6종을 이걸로 — 곡마다 클릭 한 번</span></div></div>
<div class="kicker">③ 플러그인 하나 — 프리셋 (.pst)</div>
<div class="spec wide"><div class="srow"><span class="sk">무엇</span><span class="sv" style="font-size:15px">플러그인 1개 값만(Channel EQ 곡선·Compressor 세팅·ChromaVerb 홀 등)</span></div>
<div class="srow"><span class="sk">저장</span><span class="sv" style="font-size:15px">플러그인 창 상단 프리셋 메뉴(▾) → Save As</span></div></div>
<div class="kicker">④ 악기+스마트컨트롤 — 패치</div>
<div class="spec wide"><div class="srow"><span class="sk">무엇</span><span class="sv" style="font-size:15px">채널 스트립 + 스마트 컨트롤 매핑까지 (라이브러리 단위)</span></div>
<div class="srow"><span class="sk">저장</span><span class="sv" style="font-size:15px">라이브러리(<span class="k">Y</span>) 하단 Save</span></div></div>
<div class="kicker">⑤ 그 밖에 한 번만</div>
<div class="spec wide"><div class="srow"><span class="sk">단축키</span><span class="sv" style="font-size:15px">Opt+K에서 크로스페이드 등 할당 → 앱 전체 유지</span></div>
<div class="srow"><span class="sk">스크린셋</span><span class="sv" style="font-size:15px">창 배치를 숫자키 1–9에 저장(Screensets)</span></div>
<div class="srow"><span class="sk">믹서 뷰</span><span class="sv" style="font-size:15px">View → Channel Strip Components 세팅은 저장됨</span></div>
<div class="srow"><span class="sk">Fade 클릭존</span><span class="sv" style="font-size:15px">Settings → General → Editing에서 한 번</span></div></div>
<div class="box tip"><b>순서:</b> 템플릿(버스 포함) 만들기 → 그 안에서 프리셋 6종을 .cst로 저장 → 이후 곡마다: 템플릿 열고 MIDI 임포트 → 트랙에 .cst 클릭 → 볼륨·팬만 표대로. 센드가 살아있으려면 <b>반드시 버스가 있는 템플릿 안에서 .cst를 저장</b>해야 한다.</div>`},channelstrip:{title:'채널 스트립 저장·적용 (한 번 만들어 재사용)', html:`
<p class="lead sm"><b>채널 스트립</b> = 믹서에서 트랙 한 줄(악기 + 인서트 FX + 센드 + 페이더 묶음). 한 번 저장(.cst)하면 <b>모든 프로젝트에서 클릭 한 번</b>으로 재사용된다 — 앱이 파일을 대신 만들 순 없고, 로직에서 <b>최초 1회</b> 저장하면 영구히 쓴다.</p>
<div class="kicker">0 · Setting 막대가 안 보이면 (먼저)</div>
<div class="lstep"><span class="ln">0</span><span class="lc">믹서 채널 맨 위 <b>Setting 막대</b>가 안 보이면 켜야 한다: 믹서(<span class="k">X</span>) 상단 메뉴 <b>View → Channel Strip Components → Setting 체크</b>(Inserts·Sends·EQ도 켜져 있는지 확인). 그러면 각 채널 최상단에 가는 가로 막대가 생긴다.<span class="path">믹서 View → Channel Strip Components → Setting ✓</span></span></div>
<div class="kicker">저장 · 적용</div>
<div class="lstep"><span class="ln">1</span><span class="lc">악기+FX 체인을 다 건 채널에서 최상단 <b>Setting 막대 클릭 → Save Channel Strip Setting</b> → 이름 「장르 역할」(예 <span class="v">록 기타 리듬</span>).<span class="path">믹서 → 채널 최상단 막대 → Save Channel Strip Setting</span></span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>적용:</b> 새 트랙의 Setting 막대 클릭 → 저장한 이름 선택. 또는 라이브러리(<span class="k">Y</span>)에서 클릭. 인서트+EQ+센드가 통째로 걸린다.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>저장 위치:</b> <span class="mono">~/Music/Audio Music Apps/Channel Strip Settings/</span> — 폴더째 백업하면 다른 맥에서도 그대로.</span></div>
<div class="box hot"><b class="no">⚠ .cst에 들어가는 것 / 안 되는 것</b> (실제 파일 확인). <b>들어감:</b> 악기·인서트(EQ·컴프 등)·모든 파라미터·센드 <b>양</b>. <b>안 들어감:</b> <span class="no">볼륨 페이더·팬</span> → 볼륨·팬 표대로 직접. 센드는 <b>대상 버스가 프로젝트에 있어야</b> 제대로 붙음 → 템플릿(버스) 먼저.</div>`},

sampler808:{title:'Quick Sampler 808', html:`
<div class="lstep"><span class="ln">1</span><span class="lc">트랙 악기 슬롯 → <b>Quick Sampler</b> → 파형 영역에 808 샘플 드래그.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>Tune</b>을 곡 키에 맞춤 · <b>Glide ON</b>(음정 미끄러짐).</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc">EQ 미드 <span class="v">300–800Hz +2</span>(작은 스피커에서도 들리게) → Clip Distortion은 피크만.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc">킥과 위상 충돌 시 리전을 밀어 <b>앞머리 정렬</b> — 킥=어택, 808=저역·음정 역할 분리.</span></div>`},

gatesnare:{title:'게이트 스네어 (80s)', html:`
<div class="lstep"><span class="ln">1</span><span class="lc">스네어를 <b>Bus(큰 홀 리버브)</b>로 Send — ChromaVerb Hall, Decay 길게.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc">리버브 Aux 뒤에 <b>Noise Gate</b> 삽입 → Threshold를 올려 꼬리를 '탁' 끊음.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>Release</b>로 끊기는 길이 조절 — 과하면 부자연, 길이로 맛 조절.</span></div>`},

automation:{title:'오토메이션 그리기 (모드·경로·파라미터)', html:`
<div class="lstep"><span class="ln">1</span><span class="lc"><b>켜기:</b> <span class="k">A</span> — 트랙마다 오토메이션 레인이 열리고, 트랙 헤더에 메뉴가 2개 생김: 왼쪽=<b>모드</b> · 오른쪽=<b>파라미터</b>.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>모드는 Read:</b> 그려둔 값을 재생만 함(기본). Touch/Latch는 재생 중 페이더를 실시간으로 잡아 "녹음"할 때만 씀.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>파라미터 선택:</b> Volume·Pan·Sends는 바로 목록에 있음. 플러그인 값은 <b>플러그인 이름 → 파라미터</b> 하위 메뉴 — 이름은 플러그인 화면 표기 <b>그대로</b> 찾는다(예: Channel EQ "High Cut Frequency" · Direction Mixer "Spread" · Auto Filter "Cutoff").</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>그리기:</b> 라인 <b>클릭=점</b> · 점 드래그=이동 · 두 점 사이 라인 드래그=곡선 · 점 더블클릭=삭제.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc"><b>Track vs Region:</b> 기본 Track(트랙 전역 — 리전을 옮겨도 안 따라감). 리전과 함께 움직이게 하려면 레인 좌상단에서 <b>Region</b>으로 전환.</span></div>
<div class="lstep"><span class="ln">6</span><span class="lc"><b>구간 눈금:</b> 재생헤드 이동 → Navigate → Create Marker — 섹션 경계 마커를 먼저 찍고 그 사이를 그리면 정확하다.</span></div>
<div class="box soft"><b>파라미터가 목록에 없으면:</b> Aux(버스)에 꽂힌 플러그인은 오토메이션 메뉴에 안 뜨는 경우가 있음 — 그 플러그인을 <b>오디오 트랙에 직접 인서트</b>하면 뜬다(실사용 검증됨).</div>
<div class="box hot"><b class="no">⚠</b> Volume 오토메이션을 그린 트랙은 페이더로 밸런스 조절이 안 먹는다(오토메이션이 덮어씀) — 그 트랙의 전체 레벨은 Gain 플러그인으로 움직인다.</div>`},

masterchain:{title:'마스터링 — 일반 포맷 (순서대로)', html:MASTER_STD},

masterwell:{title:'마스터링 — 웰니스·숨웨이브 최종 (순서대로)', html:MASTER_WELL},


shortcuts:{title:'로직 단축키 모음', html:CHEAT_KEYS},

regionedit:{title:'리전 편집 단축키 (자르기·뮤트·크로스페이드)', html:CHEAT_MOUSE},

tools:{title:'툴 활용법 — 마키 · 클릭존 · 치트키', html:`
<div class="kicker">마키 툴 (십자선 ┼) — 구간만 블록 선택</div>
<div class="lstep"><span class="ln">1</span><span class="lc"><b>꺼내기:</b> Tool 메뉴(<span class="k">T</span>)에서 마키 선택. 하지만 아래 "Cmd 클릭툴"로 세팅하면 툴 바꿀 필요 없음.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>즉시 자르고 삭제:</b> 지울 구간을 드래그로 씌우고 <span class="k">Delete</span> — 그 구간만 도려내지고 양옆 리전이 자동 분리. 가위로 양쪽 안 잘라도 됨.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>구간만 이동·복사:</b> 씌운 구간 안쪽을 드래그=이동 · <span class="k">Opt</span>+드래그=복사. 자르지 않아도 그 부분만 분리돼 움직임.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>오토메이션 4점 한 방:</b> <span class="k">A</span>로 오토메이션 켠 상태에서 구간 드래그 → 그 안의 라인을 위아래로 끌면 <b>양 끝에 점 4개가 자동</b>으로 찍히며 그 구간 값만 조절. 구간 볼륨만 낮추기·이펙트 값 올리기에 최고.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc"><b>재생 동기화:</b> 마키로 한 번 클릭 = 재생헤드가 그 위치로 · 구간 드래그 후 <span class="k">Space</span> = 그 구간만 반복 재생(모니터링).</span></div>
<div class="lstep"><span class="ln">6</span><span class="lc"><b>파형 스냅:</b> 오디오의 어택(솟은 부분) 근처에서 마키 클릭하면 시작점에 자석처럼 붙음 — 확대 안 해도 정확히 컷.</span></div>
<div class="kicker">궁극 세팅 — 툴 안 바꾸고 쓰기</div>
<div class="lstep"><span class="ln">7</span><span class="lc"><b>Cmd 클릭툴 = 마키:</b> 트랙영역 상단 <b>Tool 메뉴 2번째(Command-Click Tool)</b>를 마키로 지정. 이러면 평소엔 포인터, <span class="k">Cmd</span> 누른 동안만 마키로 변신 — 왼손으로 Cmd만 까딱.<span class="path">트랙영역 우상단 Tool 메뉴 → 두 번째 칸 → Marquee</span></span></div>
<div class="lstep"><span class="ln">8</span><span class="lc"><b>클릭존(키 없이):</b> 리전 위치별로 툴 자동 변신 — 상단 절반=포인터 · 하단 절반=마키 · 좌우 위 모서리=페이드.<span class="path">Logic Pro → Settings → General → Editing → Marquee/Fade Tool Click Zones 체크</span></span></div>
<div class="kicker">치트키</div>
<div class="lstep"><span class="ln">9</span><span class="lc"><b>캡처 레코딩 <span class="k">Shift+R</span>:</b> 녹음 안 하고 잼하다 좋은 연주가 나왔을 때 즉시 누르면, 방금 친 미디가 리전으로 나타남(로직이 몰래 기억 중).</span></div>
<div class="lstep"><span class="ln">10</span><span class="lc"><b>Flex Time <span class="k">Cmd+F</span>:</b> 오디오 박자가 미세하게 나갔을 때 — 파형의 마커를 잡고 좌우로 끌면 고무줄처럼 늘었다 줄며 박자 정렬(음질 손상 적음). 재녹음 불필요.</span></div>
<div class="box soft"><b>펀치 인 녹음:</b> 다시 부를 구간만 마키로 드래그 → 앞에서부터 재생하면 그 구간에서만 자동으로 녹음 On/Off. 틀린 부분만 덮어쓰기.</div>`},

musicterms:{title:'음악 용어 사전 (표에 나오는 말들)', html:`
<div class="spec wide">
<div class="srow"><span class="sk">오스티나토</span><span class="sv" style="font-size:15px">같은 짧은 음형을 계속 반복하는 것 — "저현 오스티나토"=첼로·베이스가 8분음표 음형을 깔고 도는 것</span></div>
<div class="srow"><span class="sk">페달 (페달 톤)</span><span class="sv" style="font-size:15px">한 음을 길게 지속해 바닥을 만드는 것 — 코드가 바뀌어도 유지</span></div>
<div class="srow"><span class="sk">드론</span><span class="sv" style="font-size:15px">곡 내내 깔리는 지속음 레이어</span></div>
<div class="srow"><span class="sk">소어링</span><span class="sv" style="font-size:15px">현이 높은 음역으로 길게 뻗어 오르는 선율</span></div>
<div class="srow"><span class="sk">마르카토</span><span class="sv" style="font-size:15px">한 음 한 음 또렷하고 강하게</span></div>
<div class="srow"><span class="sk">트레몰로 / 피치카토</span><span class="sv" style="font-size:15px">활을 빠르게 떨어 긴장감 / 현을 손끝으로 뜯기</span></div>
<div class="srow"><span class="sk">스탭</span><span class="sv" style="font-size:15px">짧게 끊어 치는 코드 타격(브라스·신스)</span></div>
<div class="srow"><span class="sk">리프 / 훅</span><span class="sv" style="font-size:15px">반복되는 짧은 멜로디 패턴 / 귀에 박히는 핵심 구절</span></div>
<div class="srow"><span class="sk">대선율 (카운터)</span><span class="sv" style="font-size:15px">주선율과 동시에 흐르는 두 번째 선율</span></div>
<div class="srow"><span class="sk">오블리가토</span><span class="sv" style="font-size:15px">주선율 위에 얹는 장식 선율</span></div>
<div class="srow"><span class="sk">콜앤리스폰스</span><span class="sv" style="font-size:15px">한쪽이 부르면 다른 쪽이 답하는 주고받기</span></div>
<div class="srow"><span class="sk">뱀프</span><span class="sv" style="font-size:15px">코드 1–2개를 계속 반복하는 구간</span></div>
<div class="srow"><span class="sk">레이백</span><span class="sv" style="font-size:15px">박자보다 아주 살짝 뒤에 연주해 여유를 만드는 것</span></div>
<div class="srow"><span class="sk">고스트 노트</span><span class="sv" style="font-size:15px">아주 여리게 끼워 넣는 장식 타 — 그루브의 비밀</span></div>
<div class="srow"><span class="sk">필</span><span class="sv" style="font-size:15px">구간이 바뀌기 직전 드럼이 넣는 짧은 장식</span></div>
<div class="srow"><span class="sk">하프타임 / 4온더플로어</span><span class="sv" style="font-size:15px">체감 박자를 절반으로 / 킥을 매 박마다(쿵-쿵-쿵-쿵)</span></div>
<div class="srow"><span class="sk">라이저 / 스윕</span><span class="sv" style="font-size:15px">드롭 직전 상승 효과음 / 필터를 서서히 열고 닫는 "슈웅"</span></div>
<div class="srow"><span class="sk">시머</span><span class="sv" style="font-size:15px">한 옥타브 위 음이 섞여 반짝이는 리버브</span></div>
<div class="srow"><span class="sk">글라이드</span><span class="sv" style="font-size:15px">음정이 미끄러지듯 다음 음으로 이동 — 808 특유</span></div>
<div class="srow"><span class="sk">텐션 (9·11·13)</span><span class="sv" style="font-size:15px">기본 3화음 위에 얹는 색채음 — 재즈·시티팝의 세련미</span></div>
<div class="srow"><span class="sk">모달</span><span class="sv" style="font-size:15px">장·단조 대신 선법으로 만드는 분위기(epic의 i–bVI–bVII)</span></div>
<div class="srow"><span class="sk">차용화음 / 전조</span><span class="sv" style="font-size:15px">나란한 조에서 빌려온 화음(bVII 등) / 조를 올려 마지막 후렴 상승</span></div>
<div class="srow"><span class="sk">보이싱</span><span class="sv" style="font-size:15px">화음의 음들을 위아래로 배치하는 방식</span></div>
<div class="srow"><span class="sk">커팅</span><span class="sv" style="font-size:15px">기타를 짧게 긁는 리듬 주법(시티팝·펑크)</span></div>
<div class="srow"><span class="sk">왕도 진행</span><span class="sv" style="font-size:15px">IVM7–V–iii–vi — 일본 팝의 단골 감성 진행</span></div>
<div class="srow"><span class="sk">스로우 딜레이</span><span class="sv" style="font-size:15px">구절 끝 음만 딜레이로 "던지는" 효과</span></div>
<div class="srow"><span class="sk">새추</span><span class="sv" style="font-size:15px">새츄레이션 — 배음을 더해 두꺼워지는 질감</span></div>
<div class="srow"><span class="sk">2믹스</span><span class="sv" style="font-size:15px">전 트랙을 스테레오 한 파일로 합친 것</span></div></div>`},

baked:{title:'MIDI에 구워진 것 — 로직에서 확인·활용', html:`
<p class="lead sm">앱이 뽑은 .mid 안에는 연주 정보가 이미 들어있다. 로직에서 <b>지우면 안 되는 것</b>과 <b>손보는 지점</b>을 구분한다.</p>
<div class="kicker">그대로 두는 것 (자동 연주)</div>
<div class="spec wide"><div class="srow"><span class="sk">현 라인·활 스웰</span><span class="sv" style="font-size:15px">현이 보이스리딩 레가토 라인 + 마디마다 CC11이 커졌다 작아짐(자동). 블록 화음 아님 — 그대로 두면 살아있는 활</span></div>
<div class="srow"><span class="sk">CC1 / CC11</span><span class="sv" style="font-size:15px">CC1=오케 지속악기 pp→f 셈여림 · CC11=패드·현·오케 스웰(시네마틱 기본 ON). 악기가 Dynamics via CC면 즉시 반영 — <b>지우지 말 것</b></span></div>
<div class="srow"><span class="sk">피아노 정리</span><span class="sv" style="font-size:15px">같은 시점 반음 충돌 자동 제거 · 페달은 피아노에만 — 뭉침·부딪힘 방지됨</span></div>
<div class="srow"><span class="sk">패드 = open 5th</span><span class="sv" style="font-size:15px">근음+5도+옥타브만(3도·텐션 없음) — 코드 트랙과 안 부딪힘. 그대로 둔다</span></div>
<div class="srow"><span class="sk">4마디 프레이즈 변형</span><span class="sv" style="font-size:15px">확률적·여리게: 현 9도 톱·4-3 계류·경과음 / 베이스 경과·옥타브 팝 / 피아노 9-7-5 필인 · 동일 코드 연속 시 자동 전위 회전(공통음 유지)</span></div>
<div class="srow"><span class="sk">이음새 브리지</span><span class="sv" style="font-size:15px">스파스(앰비언트) 장르: 구간 경계에 패드 스웰 + 다음 섹션 으뜸음 저역 리드인이 경계를 넘겨 지속 — 끊김 방지</span></div></div>
<div class="kicker">로직에서 열어보는 곳</div>
<div class="spec wide"><div class="srow"><span class="sk">트랙 추천 텍스트</span><span class="sv" style="font-size:15px">트랙마다 [장르] Sound/FX/Send 추천이 MIDI에 기록됨 — <b>이벤트 리스트</b>(<span class="k">D</span>)에서 열람</span></div>
<div class="srow"><span class="sk">코드 체인지 마커</span><span class="sv" style="font-size:15px">코드 바뀌는 마디마다 * 마커 · 조표·박자표·전조도 tick0/변경점에 기록 — 마커 트랙에서 확인, 오토메이션 눈금으로 활용</span></div>
<div class="srow"><span class="sk">레시피 TXT</span><span class="sv" style="font-size:15px">곡 MIDI 받을 때 셋업 시트(.txt)가 함께 다운로드 — 음악 포인트·트랙 추천 포함. 곡별 요약본</span></div></div>
<div class="box soft"><b>이벤트 리스트 여는 법:</b> 트랙 선택 → <span class="k">D</span>(또는 창 상단 List Editors → Event) — MIDI에 박힌 텍스트·CC·마커를 표로 본다.</div>`},

tension:{title:'텐션·화성 — MIDI에 든 것 다루기', html:`
<p class="lead sm">앱이 코드에 9·11·13 텐션과 경과음을 이미 넣어 뽑는다. 로직에서 <b>실제 음표</b>로 들어오므로(CC 아님) 피아노롤에서 보고 조절한다.</p>
<div class="kicker">규칙 (부딪히지 않게 설계됨)</div>
<div class="spec wide"><div class="srow"><span class="sk">텐션 9·11·13</span><span class="sv" style="font-size:15px">보이싱 최상단(음역 상한 84)에 낮은 벨로시티로 = "색". b9 어보이드 배제 · 11은 마이너 계열만 · 13은 도미넌트/메이저만·dim 제외</span></div>
<div class="srow"><span class="sk">패드는 텐션 없음</span><span class="sv" style="font-size:15px">근음+3화음(오픈)만 — 그래서 코드 트랙과 패드가 안 부딪힘</span></div>
<div class="srow"><span class="sk">세컨더리 도미넌트</span><span class="sv" style="font-size:15px">재즈 계열: 코드 전환 직전 4박에 다음 코드의 딸림7을 반마디 찔러 끌어당김</span></div>
<div class="srow"><span class="sk">앤티시페이션</span><span class="sv" style="font-size:15px">팝 훅: 다음 코드를 8분음표 먼저 침(밀어치기)</span></div>
<div class="srow"><span class="sk">리드 경과음</span><span class="sv" style="font-size:15px">도약 사이에 다이어토닉 경과 16분음을 낮은 벨로시티로 삽입 · 전조 구간은 이동된 키 스케일 추적</span></div></div>
<div class="box tip"><b>로직에서 텐션 손보기:</b> 코드 트랙 피아노롤(<span class="k">P</span>)을 열면 최상단에 낮은 벨로시티 음 = 텐션. 너무 튀면 그 음의 <b>벨로시티를 더 낮추거나 삭제</b>. 패드엔 텐션이 없으니 건드릴 필요 없음.</div>`},

basssub:{title:'베이스 주법 20종 — 장르별 특성', html:`
<p class="lead sm">앱이 장르마다 다른 베이스 주법으로 뽑는다. 트랙 이름 (주법) 표기와 일치.</p>
<div class="spec wide"><div class="srow"><span class="sk">Trap 기본</span><span class="sv" style="font-size:14.5px">808 Sub · sustained+glide — 코드 전환에 글라이드, 길게 뻗음</span></div>
<div class="srow"><span class="sk">Trap Drill</span><span class="sv" style="font-size:14.5px">808 Sliding · 레가토로 미끄러짐</span></div>
<div class="srow"><span class="sk">Trap Phonk</span><span class="sv" style="font-size:14.5px">Distorted 808 · 글라이드 없이 툭툭 짧게</span></div>
<div class="srow"><span class="sk">Lo-Fi</span><span class="sv" style="font-size:14.5px">808/Sub round · 둥글게 이어지는 서브</span></div>
<div class="srow"><span class="sk">Boombap</span><span class="sv" style="font-size:14.5px">Fingerstyle Upright · 짧게 끊고 고스트, 재지한 워킹</span></div>
<div class="srow"><span class="sk">EDM 기본</span><span class="sv" style="font-size:14.5px">Sidechained Saw · 8분, 킥에 눌렸다 부풀며 펌핑</span></div>
<div class="srow"><span class="sk">EDM Dubstep</span><span class="sv" style="font-size:14.5px">Wobble/LFO · LFO로 흔들리는 워블</span></div>
<div class="srow"><span class="sk">EDM DnB</span><span class="sv" style="font-size:14.5px">Reese/Rolling · 끊임없이 굴러가는 지속형</span></div>
<div class="srow"><span class="sk">Running Rock</span><span class="sv" style="font-size:14.5px">Picked 8ths · 픽으로 8분 미는 드라이빙</span></div>
<div class="srow"><span class="sk">Running Synth</span><span class="sv" style="font-size:14.5px">Octave 16th · 16분 옥타브 교대(80s)</span></div>
<div class="srow"><span class="sk">Running 기본</span><span class="sv" style="font-size:14.5px">Mid Synth 150-280Hz · 중음역, 이어폰 파워</span></div>
<div class="srow"><span class="sk">Retro/시티팝</span><span class="sv" style="font-size:14.5px">Fingerstyle Funk · 옥타브·고스트·당김, 2마디 그루브</span></div>
<div class="srow"><span class="sk">Country</span><span class="sv" style="font-size:14.5px">Root-Fifth upright · 4분 루트-5도 워킹+접근음</span></div>
<div class="srow"><span class="sk">Amapiano</span><span class="sv" style="font-size:14.5px">Log Drum scoop · 목표음 위에서 스쿱 다운</span></div>
<div class="srow"><span class="sk">Afrobeats</span><span class="sv" style="font-size:14.5px">Round Sub 3-3-2 · 킥 클라베 따라감</span></div>
<div class="srow"><span class="sk">Garage</span><span class="sv" style="font-size:14.5px">2-Step Stab · 스윙된 2-step 스탭</span></div>
<div class="srow"><span class="sk">Afrohouse</span><span class="sv" style="font-size:14.5px">Deep Rolling · 느긋하게 굴러가는 딥 서브</span></div>
<div class="srow"><span class="sk">K-Pop</span><span class="sv" style="font-size:14.5px">Punchy Synth · 8분, 700-1k 존재감·사이드체인</span></div>
<div class="srow"><span class="sk">Hook-Pop</span><span class="sv" style="font-size:14.5px">Driving 8th · 직진 8분+고스트 파워팝</span></div>
<div class="srow"><span class="sk">Hooksong calm</span><span class="sv" style="font-size:14.5px">Soft Sine · 낮게 이어지는 사인 서브</span></div></div>`},

compparams:{title:'컴프 숫자 읽는 법 (4:1 · 10ms · 100ms)', html:`
<p class="lead sm">"4:1 · 10ms · 100ms · GR 8–10dB" = <b>Ratio · Attack · Release · 목표 Gain Reduction</b> 순서다.</p>
<div class="lstep"><span class="ln">1</span><span class="lc"><b>Threshold(문턱):</b> 이 선을 넘는 소리만 눌린다. 숫자를 외우지 말고 <b>GR 미터가 목표 dB만큼 움직일 때까지</b> 내리는 게 요령.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>Ratio 4:1:</b> 문턱을 4dB 넘으면 1dB만 내보냄. <span class="v">2:1</span>=살짝(글루) · <span class="v">4:1</span>=표준 · <span class="v">8:1</span>=강하게(병렬용).</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>Attack 10ms:</b> 문턱을 넘고 나서 누르기 시작할 때까지의 시간. 짧으면(1ms) 첫 타격까지 눌러 얌전해지고, 길면(10–30ms) 어택은 통과시켜 <b>펀치가 산다</b>.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>Release 100ms:</b> 소리가 문턱 아래로 내려간 뒤 손을 떼기까지의 시간. 짧으면 빨리 복귀(펌핑감), 길면 부드러움. 곡의 박자 호흡에 맞추는 게 기본.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc"><b>GR(Gain Reduction):</b> 실제로 누른 양 — Compressor 우측 미터. 표의 "GR 3–4dB"는 재생 중 미터가 그만큼 움직이게 Threshold를 맞추라는 뜻.</span></div>
<div class="lstep"><span class="ln">6</span><span class="lc"><b>입력 위치:</b> Ratio/Attack/Release <b>숫자 필드 더블클릭 → 타이핑 → <span class="k">Enter</span></b>. 모델은 상단 드롭다운.<span class="path">트랙 → Audio FX → Dynamics → Compressor</span></span></div>
<div class="box soft"><b>모델 감:</b> Studio VCA=범용·깔끔 / Studio FET=빠르고 펀치(드럼·록 보컬) / Vintage Opto=느리고 부드러움(발라드·베이스). <b>Makeup(Gain)</b>은 누른 만큼 되올리는 출력 볼륨.</div>`},

eqparams:{title:'EQ 숫자 읽는 법 (HP35 · 60+2 · 200-2)', html:`
<p class="lead sm">"HP35 · 60+2 · 200-2 · 4k+2" = <b>하이패스 35Hz, 60Hz를 +2dB, 200Hz를 -2dB, 4kHz를 +2dB</b>.</p>
<div class="lstep"><span class="ln">1</span><span class="lc"><b>HP/HPF(하이패스=로우컷):</b> 그 주파수 <b>아래</b>를 잘라냄 — 럼블·저역 청소. Channel EQ 맨 왼쪽 밴드 1.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>LP/LPF(로우패스=하이컷):</b> 그 주파수 <b>위</b>를 잘라냄 — 멀리·어둡게. 맨 오른쪽 밴드 8.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>벨(60+2):</b> 60Hz 지점만 산(+)이나 골(-)로. 가운데 밴드를 켜고 노드 드래그(좌우=Freq · 상하=Gain) 또는 하단 필드 타이핑.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>셸프(HiShelf 10k+1.5):</b> 그 지점부터 위(또는 아래) <b>전체</b>를 통째로 올리고 내림 — 에어·따뜻함.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc"><b>Q(폭):</b> 클수록 좁게 찌름(문제 제거), 작을수록 넓고 자연스러움. 표기 없으면 기본값(≈0.7–1.0) 그대로. <span class="k">Opt</span> 드래그로 조절.</span></div>
<div class="box soft"><b>원칙:</b> 깎는 EQ(자리 정리)는 컴프 <b>앞</b>, 올리는 EQ(광내기)는 컴프 <b>뒤</b>. 부스트보다 컷이 항상 안전하다.</div>`},

verbparams:{title:'리버브 숫자 읽는 법 (Predelay · Decay · Size)', html:`
<div class="lstep"><span class="ln">1</span><span class="lc"><b>Predelay(20ms):</b> 원음과 첫 울림 사이의 틈. 길수록 원음이 또렷하고 공간이 커 보임 — 보컬 명료도의 핵심.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>Decay(1.6–2.0s):</b> 꼬리가 사라질 때까지의 시간. 룸 <span class="v">0.5–1s</span> · 플레이트 <span class="v">1.5–2.5s</span> · 홀 <span class="v">2.5s+</span>.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>Size:</b> 방의 크기. Decay와 함께 공간 스케일을 결정.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>Density:</b> 반사음의 촘촘함 — 낮으면 알갱이지고, 높으면 매끈.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc"><b>Damp / Distance:</b> Damp=꼬리의 고역이 얼마나 빨리 죽나(높을수록 어두운 꼬리) · Distance=소리가 얼마나 멀리서 나는 느낌.</span></div>
<div class="lstep"><span class="ln">6</span><span class="lc"><b>타입(상단 드롭다운):</b> Room=접착 · Chamber=따뜻 · Plate=보컬·화사 · Hall=오케·크게 · Synth Hall=신스·환상적.</span></div>
<div class="box soft"><b>Send 방식이면:</b> 리버브 Aux의 Mix는 <span class="v">Wet 100 / Dry 0</span> 고정 — 양 조절은 각 트랙의 Send 노브로.</div>`},

delayparams:{title:'딜레이 숫자 읽는 법 (1/8 dotted · FB 20%)', html:`
<div class="lstep"><span class="ln">1</span><span class="lc"><b>Note(1/8 dotted):</b> 반복 간격을 박자 단위로 — 점8분이 팝·EDM 표준 그루브. Tape/Stereo Delay의 <b>Sync 켠 상태</b>에서 선택.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>FB(Feedback 20–28%):</b> 반복 횟수. 낮으면 1–2번, 높으면 계속 맴돎 — 40% 넘기면 지저분해지기 쉽다.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>LP 6k:</b> 반복음의 고역을 깎아 원음보다 <b>뒤</b>로 — 딜레이가 보컬·리드를 가리지 않게.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>슬랩백(95ms):</b> Sync 끄고 시간(ms) 직접 입력 — 80–120ms 한 번 튕김. 시티팝·레트로 질감.</span></div>
<div class="box soft"><b>인서트 vs 센드:</b> 여러 트랙이 같은 딜레이 공간을 공유하면 <b>센드</b>, 그 트랙만의 톤(슬랩백)이면 <b>인서트</b>.</div>`},

lufsmeter:{title:'LUFS · dBTP · LRA 읽는 법', html:`
<div class="lstep"><span class="ln">1</span><span class="lc"><b>LUFS(Integrated):</b> 곡 전체 평균 체감 음량. 스트리밍이 이 값 기준으로 볼륨을 자동으로 맞춤(정규화) — Spotify·YouTube <span class="v">-14</span> · Apple <span class="v">-16</span>.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>dBTP(True Peak):</b> 변환 후 실제 최대 순간값. <span class="v">-1.0</span>으로 잡아야 mp3/AAC 변환에서 안 찌그러진다. 밀도 장르(-9급)로 세게 밀 땐 <span class="v">-2.0</span>이 관습 — 음압이 클수록 변환 피크가 더 튄다.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>LRA:</b> 큰 구간과 작은 구간의 폭. <span class="v">6–14</span>면 건강 — 너무 작으면 평평(과압축), 너무 크면 볼륨이 널뛴다.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>측정:</b> Loudness Meter를 Stereo Out <b>맨 마지막</b>에 걸고 곡 처음부터 끝까지 재생 → <b>Integrated(I)</b> 읽기. 다시 재기 전 Reset.<span class="path">Stereo Out → Audio FX → Metering → Loudness Meter</span></span></div>
<div class="box tip"><b>"하한"의 뜻:</b> -14보다 크게 밀어봤자 스트리밍이 도로 줄인다 — 다이내믹만 손해. 밀도 장르(EDM·트랩)만 관습상 <span class="v">-9</span>까지, 그 이상은 밀지 않는다는 선.</div>`},

volumewhere:{title:'볼륨, 뭘로 조절하나 (페이더 vs Gain)', html:`
<p class="lead sm">표에 있는 dB 숫자는 <b>전부 채널 페이더 값</b>이다 — 페이더 더블클릭 → 숫자 입력.</p>
<div class="lstep"><span class="ln">1</span><span class="lc"><b>페이더 = 밸런스.</b> 트랙끼리의 상대 크기. 표의 "Kick 0 · Bass -2"는 믹서에서 페이더를 그 값으로 놓으라는 뜻.<span class="path">믹서(X) → 페이더 더블클릭 → 숫자 → Enter (Shift 드래그=정밀)</span></span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>Gain 플러그인 = 사전 레벨 맞춤(게인 스테이징).</b> 소스 자체가 너무 크거나 작으면 인서트 <b>첫 칸</b>에 Gain을 꽂아 먼저 맞춘다 — 페이더가 0 근처에서 시작하게.<span class="path">Audio FX → Utility → Gain</span></span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>리전 Gain = 클립 하나만.</b> 특정 리전 하나만 튀면 리전 선택 → 좌측 인스펙터 Gain.<span class="path">리전 선택 → Region 인스펙터 → Gain</span></span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>오토메이션 = 시간에 따른 변화.</b> 페이드·스웰·구간별 변화는 페이더를 만지지 말고 Volume 오토메이션으로(<span class="k">A</span>).</span></div>
<div class="box hot"><b class="no">⚠</b> Volume 오토메이션을 그린 트랙은 페이더가 잠긴다(오토메이션이 덮어씀) — 그 뒤 전체 레벨 조정은 Gain 플러그인으로.</div>`},

projectdefaults:{title:'프로젝트 기본 설정 (48k · 24bit · 버퍼 · Pan Law)', html:`
<div class="lstep"><span class="ln">1</span><span class="lc"><b>48kHz · 24bit:</b> 영상·스트리밍 표준 해상도. 시작할 때 정하고 끝까지 유지.<span class="path">File → Project Settings → Audio → Sample Rate 48kHz · 녹음 비트는 Logic Pro → Settings → Recording → 24-bit</span></span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>버퍼(I/O Buffer):</b> <span class="v">128</span>=반응 빠름(연주·녹음) / <span class="v">256–1024</span>=CPU 여유(믹스). 렉이 걸리면 올리면 된다.<span class="path">Logic Pro → Settings → Audio → I/O Buffer Size</span></span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>PDC = All:</b> 플러그인 지연을 전 트랙에 자동 보정 — 안 켜면 버스 쓴 트랙이 뒤로 밀린다.<span class="path">Settings → Audio → General → Plug-in Latency Compensation: All</span></span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>Pan Law −3dB compensated:</b> 팬을 돌려도 체감 크기가 안 변하게 하는 보정 — Logic 기본값이니 그대로 두면 된다.<span class="path">File → Project Settings → Audio → Pan Law</span></span></div>`},

articulation:{title:'오케 가상악기 · 아티큘레이션 (Logic 11 내장)', html:`
<p class="lead sm">내장으로 충분히 시작 — <b>Studio Strings · Studio Horns</b>(깊게 샘플된 섹션) + Sampler 패치(목관·타악) + Alchemy(합창·하이브리드).</p>
<div class="lstep"><span class="ln">1</span><span class="lc"><b>로딩:</b> 라이브러리(<span class="k">Y</span>) → Orchestral → <b>Studio Strings</b>(Violins/Violas/Cellos/Basses 섹션) · <b>Studio Horns</b>(트럼펫·트롬본·혼). 목관·팀파니·탐탐은 Orchestral → Woodwind / Percussion 패치.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>아티큘레이션(주법) 전환:</b> Sustain·Legato·Staccato·Pizzicato·Tremolo 등을 ① 플러그인 헤더 드롭다운 ② 피아노롤 노트 선택 → <b>Articulation</b> 칼럼 ③ 키스위치(건반 최저음역) — 셋 중 편한 걸로.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>Dynamics via CC 켜기:</b> Studio Strings/Horns 화면의 <b>Dynamics via CC</b> 버튼 ON → 롱톤의 셈여림을 모드휠(CC1)이 실시간 조절 — 음량뿐 아니라 <b>음색까지</b> 여려지고 세진다.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>CC1 vs CC11:</b> CC1(모드휠)=셈여림+음색(진짜 크레셴도) · CC11=볼륨만(페이드용). 앱 MIDI에 실려온 CC11은 그대로 두고, 살아있는 스웰이 더 필요한 자리에 CC1을 피아노롤 하단 레인에서 추가로 그린다.</span></div>
<div class="lstep"><span class="ln">5</span><span class="lc"><b>짧은 주법은 벨로시티:</b> Staccato·Spiccato·브라스 히트의 강약은 노트 <b>벨로시티</b>로(CC 아님). 롱톤=CC1 · 쇼트=벨로시티 — 이 구분이 실감의 핵심.</span></div>
<div class="box soft"><b>무대 배치 팬:</b> 1st Vn <span class="v">L30</span> · 2nd Vn <span class="v">L15</span> · Va <span class="v">R10</span> · Vc <span class="v">R25</span> · Cb <span class="v">R35</span> · 혼 <span class="v">L20</span> · Tpt <span class="v">R15</span> · 팀파니 C(뒤). 깊이는 섹션 트랙 딜레이(현 뒤 <span class="v">-60ms</span> · 목관 <span class="v">-40ms</span>)로.</div>`},

frameroute:{title:'프레임 · 트랙 1개로', html:`
<p class="lead sm">버스 불필요 — 자연소리 트랙 <b>1개</b>에 플러그인 3개 직접 + 오토메이션. 음악은 안 건드림.</p>
<div class="lstep"><span class="ln">1</span><span class="lc">자연소리 트랙 1개, 인트로·아우트로에 소스 배치.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>FX 3개:</b> ① ChromaVerb(EDM=Synth Hall / 앰비언트=Dark Room · Mix <span class="v">50%</span>) ② Direction Mixer(Spread 시작 <span class="v">1.0</span>) ③ Channel EQ(밴드8 하이컷 ON · 시작 <span class="v">20,000Hz</span> · <span class="v">24dB/Oct</span>).</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>오토메이션:</b> <span class="k">A</span> → Volume / Direction Mixer Spread / Channel EQ <b>High Cut Frequency</b>(이름 그대로 찾기).</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>EDM:</b> Vol <span class="v">0→−∞</span>(0.5s) · Spread <span class="v">1.9→0.3</span> · EQ <span class="v">500Hz→20kHz</span>. <b>앰비언트:</b> Vol 3s 완만 · EQ <span class="v">2kHz→20kHz</span>. 아우트로는 같은 공간으로 복귀.</span></div>
<div class="box tip">경계: 페이드아웃 <span class="v">1.0s</span>, 꼬리가 음악 첫 마디를 1초 넘게 물리게(하드컷 금지).</div>`},
};

function beatGenreStep(g){
  const src=g.src.map(r=>`<div class="srow"><span class="sk">${r[0]}</span><span class="sv">${r[1]} <span class="sub">${r[2]}</span></span></div>`).join('');
  const proc=g.proc.map(p=>`<div class="pitem"><div class="ph">${p[0]} <span style="font-weight:400;font-size:13px;color:var(--mut)">· ${p[1]}</span></div><div class="pd">${p[2].join('<br>')}</div></div>`).join('');
  const tap=g.tap?`<button class="tapcard" data-d="${g.tap}"><span class="chev">›</span><span class="tc-h">${DETAILS[g.tap].title}</span><span class="tc-go">로직 설정법 ›</span></button>`:'';
  return {phase:'장르', kicker:`장르 ${g.n} · ${g.meta}`, title:g.name,
   html:`<div class="box soft">①열기·②템플릿 붙이기는 「곡마다」 탭 — 여기부터가 장르 작업. <b>목표 라우드니스(A):</b> <span class="v">${g.lufs}</span> · <b>포인트:</b> ${g.note}</div>
   <div class="kicker">③ 음원 로딩 — 트랙 선택 → 라이브러리 <span class="k">Y</span> → 패치 더블클릭</div>
   <div class="spec">${src}</div>
   <div class="spec wide"><div class="srow"><span class="sk">④ 사이드체인</span><span class="sv" style="font-size:15.5px">${g.sc}</span></div>
   <div class="srow"><span class="sk">폼</span><span class="sv" style="font-size:15.5px">${g.form}</span></div>
   <div class="srow tp" data-d="volumewhere"><span class="sk">시작 레벨</span><span class="sv"><span class="v" style="white-space:normal">${g.lvl}</span></span></div></div>
   <button class="tapcard" data-d="compparams"><span class="chev">›</span><span class="tc-h">4:1 · 1ms · 100ms — 이 숫자들 뜻</span><span class="tc-p">EQ·리버브·딜레이 표기법은 목차(≡) 맨 위 목록에</span><span class="tc-go">읽는 법 ›</span></button>
   <button class="tapcard" data-d="musicterms"><span class="chev">›</span><span class="tc-h">낯선 음악 용어?</span><span class="tc-p">고스트 · 스로우 · 하프타임 · 필 · 뱀프 …</span><span class="tc-go">용어 사전 ›</span></button>
   <div class="kicker">⑤ 트랙별 처리 (신호체인 · 클릭 순서)</div>
   <div class="plist">${proc}</div>
   <div class="spec wide"><div class="srow"><span class="sk">⑥ 공간 센드</span><span class="sv" style="font-size:15.5px">Sends ▸ Bus1(리버브)·Bus2(딜레이) — 공간은 센드로만(여러 트랙 공유)</span></div>
   <div class="srow"><span class="sk">⑦ 마스터링 (A만)</span><span class="sv" style="font-size:15.5px">Loudness Meter → EQ HPF 20–30 → Multipressor 가볍게 → Comp 2:1 글루 → <b>Adaptive Limiter -1dBTP · ${g.lufs.split('·')[0].trim()}</b></span></div></div>
   <div class="box tip"><div class="bt">믹스 포인트</div><p>${g.mix}</p></div>
   <div class="box warn"><div class="bt">흔한 실수</div><p>${g.err}</p></div>
   <div class="box soft"><b>목표:</b> ${g.goal}</div>${tap}
   <div class="box hot"><b>B(숨웨이브):</b> ⑦ 스킵 · <span class="v">-18 LUFS</span> 언마스터로 바운스.</div>`};
}

 <div class="spec wide"><div class="srow"><span class="sk">① 템플릿</span><span class="sv" style="font-size:15px">버스(리버브·병렬·홀)·마스터·기본값을 만들어 <b>Save as Template</b> — 곡마다 안 건드림</span></div>
 <div class="srow"><span class="sk">② 프리셋</span><span class="sv" style="font-size:15px">그 템플릿 <b>안에서</b> 장르별 트랙 세팅을 <b>.cst로 저장</b>(센드 살리려면 버스가 있는 상태여야). 「저장 체크리스트」 탭 참고</span></div>
 <div class="srow"><span class="sk">③ 곡마다</span><span class="sv" style="font-size:15px">템플릿 열기 → MIDI 임포트(트랙 생성) → 각 트랙에 .cst 클릭 → <b>볼륨·팬만</b> 표대로(프리셋에 안 담김)</span></div>
 <div class="srow"><span class="sk">④ 오토·믹싱·마스터링</span><span class="sv" style="font-size:15px">구간 오토메이션 → 믹싱 → A는 여기서 마스터링 / B는 숨웨이브로</span></div></div>
 <div class="box tip"><b>핵심:</b> .cst엔 볼륨·팬이 안 담기고, 센드는 버스가 있는 템플릿에서 저장해야 산다. 그래서 <b>템플릿 먼저 → 그 안에서 프리셋 저장</b> 순서가 중요.</div>
 <button class="tapcard" data-d="reuse"><span class="chev">›</span><span class="tc-h">한 번 저장하면 계속 쓰는 것 전체</span><span class="tc-p">템플릿·.cst·.pst·패치·단축키 지도</span><span class="tc-go">지도 ›</span></button>
 <button class="tapcard" data-d="channelstrip"><span class="chev">›</span><span class="tc-h">.cst 저장법 (Setting 막대 켜는 법)</span><span class="tc-go">로직 설정법 ›</span></button>`},
{phase:'시작 전', kicker:'최초 1회 · 하나씩 체크', title:'프리셋 저장 체크리스트',
 html:`<p class="lead sm">이 앱에서 <b>.cst로 저장할 프리셋 목록</b>. 로직에서 하나 만들 때마다 탭해서 체크 — 상태는 저장된다.</p>
 <div class="box soft"><b>만드는 법:</b> 템플릿 안에서 트랙에 장르 카드 값대로 EQ·컴프·센드 → 믹서 채널 Setting 막대 → Save Channel Strip Setting → 이름 「장르 역할」. 비슷한 건 불러와서 값만 바꿔 다른 이름으로 저장하면 빠르다.</div>

 <button class="tapcard" data-d="handoff"><span class="chev">›</span><span class="tc-h">B로 보낼 파일 규격</span><span class="tc-p">리미터 끄기 · LUFS 확인 · 바운스</span><span class="tc-go">로직 설정법 ›</span></button>
 <div class="box tip tp" data-d="lufsmeter"><div class="bt">2026 라우드니스 원칙</div><p>스트리밍은 전부 정규화(Spotify·YouTube·Tidal·Amazon -14, Apple -16). 브릭월 -6까지 밀어봤자 <span class="no">깎여서 더 나쁘게 들림</span>. 밀도는 편곡·808 관리로, 리미터로 만들지 않는다. LRA 6~14. <b>(탭 → LUFS·dBTP·LRA 읽는 법)</b></p></div>`},

{phase:'템플릿', kicker:'최초 1회 만들기 · 곡마다 붙여 씀', title:'프로젝트 템플릿',
 html:`<div class="spec wide"><div class="srow tp" data-d="projectdefaults"><span class="sk">① 기본 설정</span><span class="sv" style="font-size:15.5px">File ▸ Project Settings · <span class="v">48kHz · 24-bit</span> · 버퍼 녹음 <span class="v">128</span>/믹스 <span class="v">256–1024</span> · PDC All · Pan Law <span class="v">−3dB</span></span></div>
 <div class="srow tp" data-d="makebus"><span class="sk">② 서밍 스택</span><span class="sv" style="font-size:15.5px">트랙 <span class="k">⌘A</span> → 우클릭 Create Track Stack ▸ <b>Summing</b> → 드럼/음악/FX 스택 · [GUIDE]는 <span class="k">M</span> 뮤트</span></div>
 <div class="srow tp" data-d="verbparams"><span class="sk">③ Bus 1 리버브</span><span class="sv" style="font-size:15.5px">ChromaVerb · Predelay <span class="v">20ms</span> · Decay <span class="v">1.6–2.0s</span> · HPF 200 · LPF 8k</span></div>
 <div class="srow tp" data-d="delayparams"><span class="sk">③ Bus 2 딜레이</span><span class="sv" style="font-size:15.5px">Stereo Delay · Note <span class="v">1/8 dotted</span> · FB <span class="v">20–28%</span></span></div>

 <div class="srow tp" data-d="compparams"><span class="sk">④ 드럼 버스</span><span class="sv" style="font-size:15.5px">Comp <span class="v">2:1 GR1–2</span> → ChromaGlow Drive 낮게 → Clip Distortion 피크만</span></div>

 <div class="box tip"><b>구조 확인 —</b> 템플릿은 공통 뼈대(버스·기본값·마스터 자리)로 <b>한 번 만들어 고정</b>, 곡마다 안 건드린다. 곡별 차이는 <b>장르 카드의 트랙 프리셋·레벨·사이드체인 값으로만</b> 조절한다.</div>
 <div class="box soft">번호 줄을 <b>탭하면</b> 그 항목의 숫자가 무슨 뜻인지·어디에 입력하는지가 열린다.</div>

{phase:'곡마다', kicker:'② MIDI에 든 연주', title:'2026 엔진 — 구조·화성·주법',
 html:`<p class="lead sm">앱이 더 음악적인 MIDI를 뽑는다. 아래는 <b>이미 .mid에 들어있는</b> 것 — 로직에선 확인만 하거나 배지 구간을 재확인한다.</p>
 <div class="kicker">구조 (긴 곡 자동)</div>
 <div class="spec wide"><div class="srow"><span class="sk">구간 크래시</span><span class="sv" style="font-size:15px">인트로 뺀 모든 구간 다운비트에 크래시 자동(에너지별 세기)</span></div>
 <div class="srow"><span class="sk">▲ 전조</span><span class="sv" style="font-size:15px">긴 곡: 마지막 브릿지 뒤 코러스가 +2반음 · 96마디↑ & 훅 2덩이↑면 한 번 더 +2(누적 +4). 송시트에 D→E(+2)→F♯(+4) 기록. 허용: K-Pop·Retro·Country·Running·Hook-Pop·Boombap·Lo-Fi</span></div>
 <div class="srow"><span class="sk">빌드업 아크</span><span class="sv" style="font-size:15px">첫 사이클 레이어 절약: 첫 벌스=백비트 없음 → 첫 프리=+백비트 → 첫 훅=풀. 상승마다 크래시·라이저·스네어 롤</span></div>
 <div class="srow"><span class="sk">⤓ 스트립</span><span class="sv" style="font-size:15px">56마디↑: 마지막 클라이맥스 직전 킥만 남겼다 급쌓기(총 길이 불변). 배지 구간은 오토메이션·음원 로드 재확인</span></div></div>
 <div class="kicker">화성·주법</div>
 <div class="spec wide"><div class="srow"><span class="sk">텐션 9·11·13</span><span class="sv" style="font-size:15px">코드 최상단 낮은 벨로시티 = 색. 튀면 벨로시티↓/삭제(탭카드)</span></div>
 <div class="srow"><span class="sk">드럼 포인트</span><span class="sv" style="font-size:15px">림필·킥싱크·포인트 림샷 · 킥 48Hz 서브 · 스네어 4.2kHz 스냅 · 림샷=GM37 Side Stick</span></div>
 <div class="srow"><span class="sk">밀도 아크</span><span class="sv" style="font-size:15px">48마디↑: 구간마다 밀도값(0.35~1.15)으로 채우고 비움. 골격(코드·베이스 근음)은 유지</span></div>
 <div class="srow"><span class="sk">음원 명시</span><span class="sv" style="font-size:15px">트랙 이름에 ‖ALT(대체 음원)·(주법) 기록 → 라이브러리 검색어로 사용</span></div></div>
 <button class="tapcard" data-d="tension"><span class="chev">›</span><span class="tc-h">텐션·화성 — 로직에서 다루기</span><span class="tc-p">피아노롤에서 텐션 음 확인·조절</span><span class="tc-go">설정법 ›</span></button>
 <button class="tapcard" data-d="basssub"><span class="chev">›</span><span class="tc-h">베이스 주법 20종 특성표</span><span class="tc-p">808 글라이드 · 워킹 · 펌핑 …</span><span class="tc-go">참고 ›</span></button>
 <div class="box soft"><b>추출 후 체크:</b> ‖ALT/(주법) 확인 → 음원 선택 · 코드 최상단 벨로시티 = 텐션 · 패드는 근음+3화음(그대로) · ⤓스트립·▲전조 배지 재확인 · 신스 베이스 서스테인 정상.</div>`},

{phase:'오토메이션', kicker:'장르 특징별', title:'오토메이션 — 장르가 살아나는 지점',
 html:`<p class="lead">비트 음악은 <b>구간 전환의 오토메이션</b>이 완성도의 절반. <span class="k">A</span> → 파라미터 선택 → 마커 사이를 그린다.</p>
 <div class="spec wide"><div class="srow"><span class="sk">EDM</span><span class="sv" style="font-size:15px">빌드: Auto Filter Cutoff↑ + 노이즈 볼륨↑ + 리버브 센드↑ / 드롭 직전 1박 <b>전체 뮤트 컷</b> / 드롭: 사이드체인 그대로, 임팩트 원샷 / 브레이크: LPF 닫고 공간↑</span></div>
 <div class="srow"><span class="sk">Trap</span><span class="sv" style="font-size:15px">하이햇 롤 구간 벨로시티·피치 라이드 / 808 글라이드 구간만 두드러지게 / 훅 진입 리드 딜레이 센드↑</span></div>
 <div class="srow"><span class="sk">힙합·붐뱁</span><span class="sv" style="font-size:15px">오토메이션 최소 — 그루브는 벨로시티. 훅에서 병렬컴프 버스 페이더 +1~2dB</span></div>
 <div class="srow"><span class="sk">Lo-Fi</span><span class="sv" style="font-size:15px">LPF 컷오프를 아주 느리게 무브(10–12kHz 주변) / 바이닐 노이즈 볼륨을 구간마다 미세 변주</span></div>
 <div class="srow"><span class="sk">Global</span><span class="sv" style="font-size:15px">셰이커·퍼커션 Pan 무빙 / 로그드럼 필터 살짝 열기 / 브레이크 후 재진입 리버스 심벌</span></div>
 <div class="srow"><span class="sk">K-Pop</span><span class="sv" style="font-size:15px">프리코러스 끝 필터 스윕 / 드롭 직전 뮤트 컷+임팩트 / 포스트코러스 요소 언뮤트</span></div>
 <div class="srow"><span class="sk">시티팝</span><span class="sv" style="font-size:15px">코러스에서 코러스FX Mix↑(더 와이드) / 게이트 스네어 Release를 섹션별로</span></div>
 <div class="srow"><span class="sk">러닝</span><span class="sv" style="font-size:15px">케이던스 고정 — 볼륨 아크 없이 / 재가속 구간 필터 오픈 스윕 + 라이저</span></div>
 <div class="srow"><span class="sk">훅송·훅팝</span><span class="sv" style="font-size:15px">레이어 계단식 언뮤트(벌스→프리→코러스) / 마지막 코러스 전체 +1dB</span></div></div>
 <button class="tapcard" data-d="automation"><span class="chev">›</span><span class="tc-h">오토메이션 그리는 법</span><span class="tc-p">모드 · 파라미터 찾기 · Track vs Region</span><span class="tc-go">로직 설정법 ›</span></button>`},
{phase:'믹싱', kicker:'킥 기준 · 모노 먼저', title:'믹싱 — 순서 · EQ · 컴프 · 볼륨/팬',
 html:`<div class="lstep"><span class="ln">1</span><span class="lc"><b>게인부터.</b> 각 트랙 인서트 <b>첫 칸에 Gain</b>(Utility) — 재생하며 채널 미터 피크가 <span class="v">-12~-6</span>이 되게. 페이더는 전부 0 근처에서 시작해야 뒤가 편하다.</span></div>
<div class="lstep"><span class="ln">2</span><span class="lc"><b>자리 정리 — 감산 EQ.</b> 각 트랙 Channel EQ 밴드1(HPF): 킥 <span class="v">30</span> · 베이스 <span class="v">30</span> · 스네어 <span class="v">60</span> · 기타·신스 <span class="v">90–120</span> · 리드 <span class="v">100–150</span> · 패드 <span class="v">200</span>. <b>겹치면 덜 중요한 쪽을 판다:</b> 킥이 안 뚫리면 베이스에 벨 <span class="v">60Hz -2~-3 · Q1.0</span> / 리드가 묻히면 코드·기타에 <span class="v">3kHz -2 · Q1.2</span>.</span></div>
<div class="lstep"><span class="ln">3</span><span class="lc"><b>컴프 — 트랙별로 이렇게.</b> 드럼 스택: <span class="v">Studio FET · 4:1 · 10ms · 100ms</span> → Threshold 내려 <b>GR 3–4dB</b>(펀치 유지) / 베이스: <span class="v">Studio VCA · 4:1 · 10–30ms</span> → GR <span class="v">3dB</span>(고르게) / 리드: <span class="v">3:1</span> → GR <span class="v">3–4dB</span> / 패드: 안 걸거나 <span class="v">2:1 GR 1dB</span>. 항상 <b>GR 미터를 보며 Threshold로</b> 맞춘다 — 숫자 필드 더블클릭 입력.</span></div>
<div class="lstep"><span class="ln">4</span><span class="lc"><b>광내기 — 컴프 뒤에.</b> 필요한 트랙만: HiShelf <span class="v">8–12k +1~2</span>(에어) · ChromaGlow Drive 낮게(두께). 부스트는 항상 컷보다 조심스럽게.</span></div>

function bandSetStep(s){
  const pr=s.presets.map(p=>`<div class="srow"><span class="sk">${p[0]}</span><span class="sv" style="font-size:15px">${p[1]}<span class="sub">${p[2]}</span></span></div>`).join('');
  const inst=s.inst?`<div class="kicker">가상악기 로딩 — 라이브러리 <span class="k">Y</span></div><div class="spec">${s.inst.map(t=>`<div class="srow"><span class="sk">${t[0]}</span><span class="sv" style="font-size:15px">${t[1]}<span class="sub">${t[2]}</span></span></div>`).join('')}</div>`:'';
  const tap=s.tap?`<button class="tapcard" data-d="${s.tap}"><span class="chev">›</span><span class="tc-h">${DETAILS[s.tap].title}</span><span class="tc-go">로직 설정법 ›</span></button>`:'';
  return {phase:'장르', kicker:`${s.styles} · <span class="v">${s.lufs}</span>`, title:s.name,
   html:`<div class="box tip"><div class="bt">사운드 정체성</div><p>${s.ident}</p></div>
   <div class="spec wide"><div class="srow"><span class="sk">앱 세팅</span><span class="sv" style="font-size:15px">${s.app}</span></div>
   <div class="srow"><span class="sk">구조</span><span class="sv" style="font-size:15px">${s.struct}</span></div>
   <div class="srow"><span class="sk">진행·리듬</span><span class="sv" style="font-size:15px">${s.prog}</span></div></div>
   <button class="tapcard" data-d="musicterms"><span class="chev">›</span><span class="tc-h">낯선 음악 용어?</span><span class="tc-p">오스티나토 · 뱀프 · 레이백 · 스탭 · 왕도 진행 …</span><span class="tc-go">용어 사전 ›</span></button>
   ${inst}
   <div class="kicker">트랙 프리셋 — Setting ▾에서 클릭 한 번</div>
   <div class="spec">${pr}</div>
   <button class="tapcard" data-d="reuse"><span class="chev">›</span><span class="tc-h">한 번 저장하면 계속 쓰는 것</span><span class="tc-p">템플릿·.cst·.pst·패치 전체 지도</span><span class="tc-go">지도 ›</span></button>
 <button class="tapcard" data-d="channelstrip"><span class="chev">›</span><span class="tc-h">프리셋 저장·적용하는 법</span><span class="tc-p">Save Channel Strip Setting · 볼륨·팬 미포함 주의</span><span class="tc-go">로직 설정법 ›</span></button>
   <div class="box soft"><b>마커 오토메이션:</b> ${s.auto}</div>
   <div class="box tip"><div class="bt">믹스 목표</div><p>${s.mixaim}</p></div>
   <div class="box warn"><div class="bt">함정</div><p>${s.trap}</p></div>${tap}`};
}

}
